schema_version: "1.0"
description: >
  Contrat de données entre le pipeline de calcul actuariel (builder)
  et l'agent rédacteur (report_agent). Ce fichier documente la structure
  du payload JSON attendu par generate_report.generate().

# ─────────────────────────────────────────────
# Champs REQUIS (validate_payload lève ValueError si absents)
# ─────────────────────────────────────────────
required_fields:
  domain:
    type: string
    description: Identifiant du domaine actuariel
    examples: ["mortality", "disability", "lapse"]

  study_ref:
    type: string
    description: Référence de l'étude (apparaît dans le PDF)
    examples: ["Analyse 2024-01", "Portefeuille Retraite Q3"]

  user_message:
    type: string
    description: Message original de l'utilisateur (demande d'analyse)

# ─────────────────────────────────────────────
# Champs OPTIONNELS
# ─────────────────────────────────────────────
optional_fields:
  schema_version:
    type: string
    default: "1.0"

  summary:
    type: string
    description: Synthèse finale produite par l'agent de calcul

  steps:
    type: array
    description: Liste des étapes de calcul produites par l'agent
    items:
      description:
        type: string
      code:
        type: string
        description: Code Python exécuté
      output:
        type: string
        description: Sortie texte (stdout)
      display_outputs:
        type: array
        description: DataFrames affichés via display()
        items:
          text:
            type: string
          html:
            type: string | null
      figures:
        type: array
        description: Graphiques matplotlib encodés en base64 (PNG)
        items:
          type: string  # base64
      success:
        type: boolean

  writer_prompt:
    type: string | null
    description: Prompt rédacteur (issu de l'encoder). Si absent, fallback sur report_agent_system_prompt.md

  template_sections:
    type: array | null
    description: Sections définies dans le template encoder
    items:
      id:
        type: string
      title:
        type: string
      description:
        type: string

  methodology:
    type: object | null
    description: Paramètres méthodologiques extraits du template encoder
    properties:
      age_min:
        type: integer
        default: 25
      age_max:
        type: integer
        default: 85

  prebuilt_figures:
    type: object | null
    description: >
      Figures pré-générées, encodées en base64.
      Clés standard : exposure, rates, smr, oa, comparison
    additionalProperties:
      type: string  # base64-encoded PNG

  pdf_reference_path:
    type: string | null
    description: Chemin vers le PDF de référence (Vision API → reproduction graphiques)

  output_path:
    type: string | null
    description: Chemin de sortie du PDF. Si absent, fichier temporaire.

# ─────────────────────────────────────────────
# Notes d'implémentation
# ─────────────────────────────────────────────
notes:
  - Les figures dans steps.figures et prebuilt_figures doivent être encodées en base64 pour garantir la sérialisabilité JSON (build_payload() le fait automatiquement).
  - La priorité de génération des figures est : prebuilt_figures > pdf_reference_path (Vision API) > parsing des steps > données synthétiques (fallback).
  - generate_report.generate() désérialise les base64 → bytes avant d'appeler generate_narrative_report().
