# Catalogue des tools disponibles — Agent Actuariat
# Generated by catalogue.py — do not edit manually.
# Re-generate with: python tools/catalogue.py --force

tools:
  build_pdf.generate_notebook:
    display_name: Notebook Python reproductible
    short_description: Génère un Jupyter notebook reproduisant toute la session d'analyse.
    description: Génère un Jupyter notebook Python reproduisant toute la session d'analyse. Chaque appel de tool produit une
      cellule Python exécutable. Le notebook est autonome et peut être lancé depuis le dossier racine du projet. Permet au
      client de reproduire et d'adapter l'analyse indépendamment.
    domain: descriptive
    capability_group: reporting
    depends_on: []
    required_by: []
    client_visible: true
    when_to_use: Proposer systématiquement à la fin d'une analyse complète comme livrable reproductible. Appeler après que
      tous les outils d'analyse ont été exécutés et leurs résultats enregistrés dans _call_log.
    when_not_to_use: Ne pas appeler si _call_log est vide (aucun appel de tool effectué). Ne pas appeler en cours d'analyse
      — attendre la fin.
    prerequisites:
      required_tools: []
      required_data_store_keys:
      - _call_log (requis — liste des appels de session)
    params:
      output_path:
        type: string
        values: chemin de fichier .ipynb
        default: /tmp/analyse_actuarielle.ipynb
        note: L'interface gère le téléchargement. Ne pas exposer au client.
      portfolio_info:
        type: string
        values: texte court
        default: '""'
        note: 'Description courte du portefeuille (ex: "45 231 lignes, 2010-2023").'
      csv_filename:
        type: string
        values: nom de fichier CSV
        default: portefeuille.csv
        note: Nom du fichier CSV que le client devra fournir pour relancer le notebook.
    outputs:
      data_store_keys_written: []
      return_payload:
        succes: bool
        output_path: str
        nb_cellules: int — nombre de cellules générées
        nb_etapes: int — nombre d'étapes du pipeline reproduites
    quality_gates:
      blocking:
      - _call_log vide → notebook généré avec seulement les imports (pas d'étapes).
    errors:
    - error: '[exception lors de l''écriture du fichier]'
      cause: Erreur système lors de l'écriture du fichier .ipynb.
      action: Vérifier les droits d'accès au répertoire /tmp/.
    reasoning_hint: 'Proposer à la fin d''une analyse : "Souhaitez-vous un notebook Python reproductible ?" Inclure le nom
      du fichier CSV dans csv_filename. Ne jamais mentionner le chemin output_path dans la réponse au client.'
    exemplar_query: Comment générer un notebook reproductible à la fin d'une analyse actuarielle ?
  build_pdf.session_log:
    display_name: Log de session (rejouer l'analyse)
    short_description: Génère un fichier TXT avec le log complet et un bloc JSON de replay.
    description: Génère un fichier TXT de log de la session actuarielle. Contient le raisonnement de l'agent, la séquence
      complète d'appels avec paramètres et résultats, et un bloc JSON "REPLAY" permettant de rejouer identiquement la même
      analyse lors d'une session future.
    domain: descriptive
    capability_group: reporting
    depends_on: []
    required_by: []
    client_visible: true
    when_to_use: Proposer systématiquement à la fin d'une analyse complète. Particulièrement utile pour les clients souhaitant
      rejouer l'analyse sur un nouveau portefeuille ou valider la reproductibilité des résultats.
    when_not_to_use: Ne pas appeler si _call_log est vide (aucun appel de tool effectué).
    prerequisites:
      required_tools: []
      required_data_store_keys:
      - _call_log (requis — liste des appels de session)
    params:
      output_path:
        type: string
        values: chemin de fichier .txt
        default: /tmp/session_actuarielle.txt
        note: L'interface gère le téléchargement. Ne pas exposer au client.
      portfolio_info:
        type: string
        values: texte court
        default: '""'
        note: 'Description du portefeuille (ex: "45 000 lignes, 8 colonnes, 2010-2023").'
    outputs:
      data_store_keys_written: []
      return_payload:
        succes: bool
        output_path: str
        nb_steps: int — nombre d'étapes enregistrées dans le log
    quality_gates:
      blocking:
      - _call_log vide → log généré sans étapes. Informer le client.
    errors:
    - error: '[exception lors de l''écriture du fichier]'
      cause: Erreur système lors de l'écriture.
      action: Vérifier les droits d'accès au répertoire /tmp/.
    reasoning_hint: 'Proposer à la fin d''une analyse : "Souhaitez-vous un log de session pour rejouer cette analyse ?" Le
      bloc JSON REPLAY dans le log permettra à l''agent de reproduire exactement la même séquence. Ne jamais mentionner le
      chemin output_path dans la réponse au client.'
    exemplar_query: Comment permettre au client de rejouer une analyse actuarielle identique ?
  graphs.sample_gallery:
    display_name: Galerie de rendus disponibles
    short_description: Montre des exemples de graphiques disponibles avec données synthétiques.
    description: Génère une galerie de mini-graphiques avec données synthétiques pour montrer au client les types de rendus
      disponibles avant toute analyse. Aucune donnée réelle n'est requise. Utile pour orienter le client sur ce que le système
      peut produire.
    domain: descriptive
    capability_group: graphs
    depends_on: []
    required_by: []
    client_visible: true
    when_to_use: Appeler en début de session si le client demande "quels graphiques tu peux faire", "montre-moi des exemples",
      "qu'est-ce que tu peux produire" ou formulation similaire. Appeler AVANT tout autre outil si la demande porte sur les
      capacités visuelles du système.
    when_not_to_use: Ne pas appeler si le client a déjà vu la galerie dans la session. Ne pas appeler si la demande est une
      analyse concrète (et non une demande de visualisation des capacités).
    prerequisites:
      required_tools: []
      required_data_store_keys: []
    params:
      filter:
        type: string
        values: descriptive | builder | all
        default: all
        note: '"descriptive" = pyramide, séries, segmentation. "builder" = exposition,'
    outputs:
      data_store_keys_written: []
      return_payload:
        samples: list[dict] — [{chart, title, description, category, image_b64}]
        n_samples: int — nombre de graphiques générés
    quality_gates:
      non_blocking:
      - erreur dans un graphique individuel → l'entrée contiendra une clé "erreur"
    errors:
    - error: '[aucun retour erreur global — erreurs individuelles dans chaque sample]'
      cause: Exception lors de la génération d'un graphique synthétique.
      action: Afficher les autres graphiques disponibles. Logger l'erreur.
    reasoning_hint: 'Utiliser filter="descriptive" pour une demande d''analyse descriptive, filter="builder" pour une demande
      de construction de table, filter="all" si la demande est générale ou ambiguë. Après la galerie, demander : "Parmi ces
      rendus, lesquels souhaitez-vous inclure dans votre étude ?"'
    exemplar_query: Quels rendus visuels proposer pour une étude de mortalité d'expérience ?
  reasoning.understand_request:
    display_name: Compréhension de la demande
    short_description: Classifie l'intent de la demande client via OpenAI et extrait les entités métier.
    description: Analyse et classifie la demande métier de l'utilisateur via un appel à l'API OpenAI (GPT-4o-mini). Identifie
      l'intent (analyse descriptive, construction de table, rapport PDF, graphique, autre), extrait les entités métier, et
      génère des questions de clarification si nécessaire.
    domain: descriptive
    capability_group: descriptive
    depends_on: []
    required_by: []
    client_visible: false
    when_to_use: Appeler optionnellement en début de session pour classifier une demande ambiguë ou complexe. Utile si l'intent
      n'est pas évident depuis le message de l'utilisateur.
    when_not_to_use: 'Ne pas appeler si l''intent est clair depuis le message (ex: "construis ma table de mortalité" → intent
      évident). Ne pas appeler à chaque tour de conversation — uniquement au premier message ambigu.'
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit context dict directement (pas df, pas data_store).
    outputs:
      data_store_keys_written: []
      return_payload:
        intent: str — analyse_descriptive | table_mortalite | rapport_pdf | graphique | autre
        entities: dict — {portefeuille, sexe, periode, produit, ...}
        clarifications: list[str] — questions à poser (max 3)
        confidence: float — 0.0 à 1.0
        reasoning: str — explication courte
    quality_gates:
      non_blocking:
      - confidence < 0.5 → poser les clarifications retournées au client avant
      - intent = "autre" → informer le client que la demande est hors périmètre.
    errors:
    - error: 'Erreur lors de l''analyse : ...'
      cause: Erreur API OpenAI ou message vide.
      action: Ne pas relancer. Procéder avec l'intent par défaut ("autre")
    reasoning_hint: 'Utiliser uniquement pour les demandes vraiment ambiguës. Si confidence > 0.7, procéder directement avec
      l''intent sans demander de confirmation. Si clarifications est non vide, poser la première question uniquement (ne pas
      surcharger le client de questions). Note : utilise OpenAI API — nécessite une clé API valide configurée.'
    exemplar_query: Comment classifier la demande "fais-moi une étude complète du portefeuille" ?
  statistical_analysis.age_distribution:
    display_name: Distribution des âges
    short_description: Calcule la distribution des âges d'entrée par tranches et statistiques clés.
    description: Calcule la distribution des âges d'entrée en observation par tranches. Fournit les statistiques clés (min,
      max, médiane, moyenne) et une distribution par tranches d'âge paramétrables. Supporte la ventilation par sexe H/F. Résultat
      utilisé par graphs.analysis_plots (chart=age_pyramid).
    domain: descriptive
    capability_group: descriptive
    depends_on: []
    required_by:
    - graphs.analysis_plots
    - build_pdf.descriptive_report
    client_visible: true
    when_to_use: Appeler dans toute analyse descriptive pour caractériser la structure d'âge du portefeuille. Résultat requis
      avant graphs.analysis_plots (age_pyramid).
    when_not_to_use: Ne pas appeler si date_naissance ou date_entree sont absentes (retourne erreur).
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit df (DataFrame) directement.
    params:
      by_sex:
        type: bool
        values: true | false
        default: 'false'
        note: Si true, génère distribution_H et distribution_F en plus de la distribution globale.
      band_width:
        type: int
        values: 1–20
        default: '5'
        note: Largeur des tranches d'âge en années. 5 est standard pour la plupart des analyses.
    outputs:
      data_store_keys_written:
      - 'ages : dict — résultat complet (age_min, age_max, age_median, age_moyen, distribution)'
      return_payload:
        age_min: float
        age_max: float
        age_median: float
        age_moyen: float
        distribution: 'dict — {tranche: nb_contrats}'
    quality_gates:
      blocking:
      - Colonnes date_entree ou date_naissance absentes → retourne erreur.
      non_blocking:
      - avertissement présent (colonne sexe absente alors que by_sex=True) → informer
    errors:
    - error: 'Colonnes d''âge introuvables. Colonnes disponibles : [...]'
      cause: date_entree ou date_naissance absent du DataFrame.
      action: Vérifier le dictionnaire de données avec le client. Ne pas relancer
    - error: Aucun âge valide calculable.
      cause: Toutes les dates sont invalides ou manquantes.
      action: Appeler statistical_analysis.data_quality pour diagnostiquer.
    reasoning_hint: Utiliser by_sex=True uniquement si le client demande une ventilation H/F ET si la colonne sexe a été confirmée
      dans le dictionnaire de données. Le résultat "ages" est requis dans le data_store pour graphs.analysis_plots.
    exemplar_query: Comment interpréter une distribution d'âges concentrée sur 40-60 ans ?
  statistical_analysis.data_quality:
    display_name: Inspection qualité des données
    short_description: Détecte et affiche les lignes problématiques (dates invalides, valeurs manquantes).
    description: 'Inspecte la qualité des données du portefeuille : détecte et montre les lignes problématiques (dates invalides,
      dates sentinelles, valeurs manquantes). Retourne un tableau de lignes en erreur avec leurs valeurs brutes pour affichage
      direct dans le chat client.'
    domain: descriptive
    capability_group: descriptive
    depends_on: []
    required_by: []
    client_visible: true
    when_to_use: 'Appeler IMMÉDIATEMENT si un tool retourne une erreur liée aux données (dates invalides, colonnes manquantes,
      format incorrect). Règle absolue : ne jamais dire "je ne peux pas afficher les lignes" sans avoir appelé data_quality
      d''abord. Appeler aussi proactivement après portfolio_summary si qualite_donnees contient des anomalies.'
    when_not_to_use: 'Ne pas appeler de manière répétée si aucune erreur de données n''est détectée. Ne pas appeler si l''erreur
      est liée à un paramètre (ex: function_name incorrect).'
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit df (DataFrame) directement.
    params:
      focus:
        type: string
        values: dates | all
        default: dates
        note: '"dates" inspecte les colonnes de dates uniquement. "all" inclut'
      max_rows:
        type: int
        values: 1–50
        default: '8'
        note: Nombre maximum de lignes problématiques à retourner dans "table".
      column:
        type: string
        values: nom de colonne CSV
        default: 'null'
        note: Si spécifié, inspecter uniquement cette colonne.
    outputs:
      data_store_keys_written: []
      return_payload:
        issues: list[dict] — {colonne, role, type, count, pct, exemples_valeurs}
        total_rows: int
        total_issues: int — nb lignes affectées
        table: list[dict] — lignes problématiques avec valeurs brutes
        columns_header: list[str] — en-têtes du tableau
        summary: str — résumé en une phrase ("X lignes avec dates invalides sur Y (Z%)")
    quality_gates:
      non_blocking:
      - total_issues > 0 → afficher le tableau retourné directement dans le chat.
    errors:
    - error: '[aucun retour erreur — retourne résultats vides si aucune anomalie]'
      cause: N/A
      action: N/A
    reasoning_hint: 'RÈGLE ABSOLUE : si un tool retourne une erreur liée aux données, appeler data_quality IMMÉDIATEMENT.
      Afficher le tableau "table" directement dans la réponse au client. Ne jamais estimer ou supposer le problème sans données
      concrètes. Exemple de réponse attendue : "J''ai détecté 12 lignes avec des dates invalides sur 45 231 (0.03%). Voici
      les exemples : [tableau]. Options : supprimer ces 12 lignes, ou les corriger manuellement."'
    exemplar_query: Comment afficher les lignes avec des dates invalides dans un portefeuille assurance ?
  statistical_analysis.portfolio_summary:
    display_name: Résumé global du portefeuille
    short_description: Calcule les indicateurs clés du portefeuille (volume, exposition, décès, âges).
    description: 'Calcule le résumé global du portefeuille : volume (contrats, décès), période couverte, exposition totale
      en personne-années, statistiques d''âge, répartition par sexe, et indicateurs de qualité des données. Premier outil
      à appeler dans toute analyse descriptive.'
    domain: descriptive
    capability_group: descriptive
    depends_on: []
    required_by:
    - build_pdf.descriptive_report
    client_visible: true
    when_to_use: Appeler en premier dès qu'une analyse descriptive est demandée. Fournit le contexte fondamental pour toutes
      les analyses suivantes. Obligatoire avant build_pdf.descriptive_report.
    when_not_to_use: Ne pas appeler si seule une construction de table de mortalité est demandée (builder.exposure suffit).
      Ne pas relancer à l'identique si les colonnes requises sont absentes.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit df (DataFrame) directement.
    params:
      observation_end:
        type: string
        values: date au format YYYY-MM-DD
        default: 'null'
        note: Date de fin d'observation pour tronquer les dates futures.
      max_reasonable_exit_date:
        type: string
        values: date au format YYYY-MM-DD
        default: '2100-01-01'
        note: Date maximale acceptable si observation_end est absent.
    outputs:
      data_store_keys_written:
      - 'summary : dict — résultat complet'
      return_payload:
        nb_contrats: int
        nb_deces: int
        exposition_totale_pa: float
        qualite_donnees: dict
        warnings: list[str]
    quality_gates:
      blocking:
      - Aucune colonne date_entree détectée → résumé partiel. Clarifier avec client.
      non_blocking:
      - warnings non vide → afficher chaque warning au client (dates invalides,
    errors:
    - error: '[aucun retour erreur structuré — outil robuste, s''adapte aux colonnes disponibles]'
      cause: Colonnes absentes → résultats partiels (None pour les indicateurs non calculables).
      action: Utiliser les indicateurs disponibles et signaler les limitations au client.
    reasoning_hint: Toujours appeler en premier dans une analyse descriptive. Utiliser les warnings retournés pour informer
      le client des anomalies de données détectées. Si qualite_donnees contient des anomalies, proposer d'appeler statistical_analysis.data_quality
      pour les détails.
    exemplar_query: Que faire si portfolio_summary retourne un taux_brut_deces nul sur un grand portefeuille ?
  statistical_analysis.segmentation:
    display_name: Segmentation du portefeuille
    short_description: Calcule la répartition des contrats et décès par variables catégorielles.
    description: Calcule la répartition des contrats et décès par variables catégorielles (sexe, produit, statut de sortie,
      etc.). S'adapte automatiquement aux colonnes disponibles. Résultat utilisé par graphs.analysis_plots (chart=segmentation)
      et build_pdf.descriptive_report.
    domain: descriptive
    capability_group: descriptive
    depends_on: []
    required_by:
    - graphs.analysis_plots
    - build_pdf.descriptive_report
    client_visible: true
    when_to_use: Appeler pour produire des tableaux de répartition par variable catégorielle. Utile pour identifier les sous-populations
      à mortalité différente. Si le client a spécifié des colonnes après validation du dictionnaire de données, les passer
      dans params.columns.
    when_not_to_use: Ne pas appeler si aucune variable catégorielle n'est disponible dans le CSV.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit df (DataFrame) directement.
    params:
      columns:
        type: list[string]
        values: noms exacts des colonnes CSV
        default: '[sexe, produit, cause_sortie] (détection automatique)'
        note: Si le client a précisé des colonnes à analyser après validation du
    outputs:
      data_store_keys_written:
      - 'segmentation : dict — résultat complet (total_contrats, total_deces, segmentations)'
      return_payload:
        total_contrats: int
        total_deces: int
        segmentations: 'dict — {nom_variable: list[{valeur, nb_contrats, nb_deces, pct_contrats, pct_deces}]}'
    quality_gates:
      non_blocking:
      - avertissement présent → aucune colonne catégorielle trouvée. Informer le client.
    errors:
    - error: '[aucun retour erreur structuré — retourne avertissement si aucune colonne trouvée]'
      cause: Aucune colonne catégorielle détectée.
      action: Demander au client quelles colonnes segmenter. Relancer avec params.columns.
    reasoning_hint: Si le client a validé des colonnes spécifiques dans le dictionnaire de données (sexe = "genre", produit
      = "cat_produit"), passer ces noms exacts dans params.columns. La détection automatique peut ne pas les reconnaître.
      Le résultat "segmentation" est requis pour graphs.analysis_plots.
    exemplar_query: Quelles variables de segmentation sont pertinentes pour une analyse de mortalité ?
  statistical_analysis.time_series:
    display_name: Évolution temporelle
    short_description: Calcule l'évolution annuelle de l'exposition et des décès par année.
    description: 'Construit une série temporelle annuelle du portefeuille : nombre d''entrées, de décès, et exposition en
      personne-années par année calendaire. Détecte automatiquement les anomalies temporelles (années à exposition anormalement
      faible). Résultat utilisé par graphs.analysis_plots (chart=time_series).'
    domain: descriptive
    capability_group: descriptive
    depends_on: []
    required_by:
    - graphs.analysis_plots
    - build_pdf.descriptive_report
    client_visible: true
    when_to_use: Appeler dans toute analyse descriptive pour visualiser l'évolution temporelle du portefeuille. Utile pour
      détecter des ruptures de collecte ou des anomalies de volume.
    when_not_to_use: Ne pas appeler si date_entree est absente (retourne erreur).
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit df (DataFrame) directement.
    outputs:
      data_store_keys_written:
      - 'series : dict — résultat complet (serie, annee_min, annee_max, nb_annees, anomalies)'
      return_payload:
        serie: list[dict] — annee, nb_entres, nb_deces, exposition_pa par année
        annee_min: int
        annee_max: int
        nb_annees: int
        anomalies: list[str] — années avec données manquantes ou exposition faible
    quality_gates:
      blocking:
      - Colonne date_entree absente → retourne erreur.
      non_blocking:
      - anomalies non vide → signaler les années problématiques au client.
    errors:
    - error: 'Colonne date d''entrée introuvable. Colonnes : [...]'
      cause: date_entree absent du DataFrame.
      action: Vérifier le dictionnaire de données avec le client.
    - error: Aucune date d'entrée valide.
      cause: Toutes les dates d'entrée sont invalides ou manquantes.
      action: Appeler statistical_analysis.data_quality pour diagnostiquer.
    reasoning_hint: Si anomalies est non vide, expliquer au client les années concernées. Une exposition anormalement faible
      peut indiquer un démarrage de contrat en milieu d'année ou une fin de collecte. Le résultat "series" est requis pour
      graphs.analysis_plots (chart=time_series).
    exemplar_query: Comment interpréter une série temporelle avec une chute soudaine d'exposition ?
  graphs.report_figures:
    display_name: Graphiques rapport de mortalité
    short_description: Génère les 7 types de graphiques standards pour un rapport de mortalité.
    description: Génère les graphiques standards pour un rapport de mortalité d'expérience. Chaque type de graphique correspond
      à un angle d'analyse distinct du rapport (exposition, taux bruts, IC, benchmarking, etc.). Les figures sont sauvegardées
      sur disque et leur chemin est retourné pour intégration dans le PDF.
    domain: mortalite
    capability_group: graphs
    required_by:
    - build_pdf.certification_report
    - build_pdf.descriptive_report
    client_visible: false
    when_to_use: 'Depuis le ReportAgent, après avoir lu les signaux du data_store (Étapes A et B du raisonnement interprétatif).
      Choisir les types de graphiques en fonction des anomalies détectées : - exposition         : toujours inclure (vue générale
      du portefeuille) - taux_log           : toujours inclure (taux bruts vs lissés) - deces_ic95         : inclure si IC
      larges ou exposition faible - abattements        : inclure si abatement_table disponible - smr_par_decile     : inclure
      si hétérogénéité détectée dans les déciles - logits             : inclure si lissage Whittaker utilisé - comparaison_precedente
      : inclure si une table précédente est disponible'
    when_not_to_use: Ne pas appeler avant que smoothed_table soit disponible dans le data_store. Ne pas appeler avec un type
      non listé — retourner erreur.
    prerequisites:
      required_tools: []
      required_data_store_keys:
      - smoothed_table (pour taux_log, logits, comparaison_precedente)
      - exposure_table (pour exposition, deces_ic95)
      - benchmarking (pour abattements, smr_par_decile)
      - validation (pour deces_ic95)
    params:
      figure_type:
        type: string
        note: '>'
      output_path:
        type: string
        default: '"/tmp/figure_{figure_type}.png"'
        note: Chemin de sauvegarde du PNG. Créé automatiquement si absent.
      title:
        type: string
        default: '""'
        note: Titre optionnel du graphique.
      sexe:
        type: string
        default: '""'
        note: '"H", "F" ou "" — ajouté au titre si précisé.'
    outputs:
      data_store_keys_written: []
      return_payload:
        figure_path: string — chemin absolu du PNG généré
        figure_type: string — type de graphique généré
        warning: string | null
    quality_gates:
      blocking:
      - 'figure_type non reconnu → erreur "Type de graphique inconnu : {type}"'
      - données requises absentes du data_store → erreur descriptive
      non_blocking:
      - aucune donnée dans la plage d'âges → warning + figure vide générée
    errors:
    - error: Type de graphique inconnu
      cause: figure_type non dans la liste acceptée
      action: retourner erreur, lister les types disponibles
    - error: Données manquantes
      cause: clé data_store absente
      action: retourner erreur avec indication de la clé manquante
    reasoning_hint: Générer exposition et taux_log en priorité — ils figurent dans tous les rapports. Puis choisir les autres
      selon les signaux détectés. Le paramètre output_path doit pointer vers /tmp/ pour les rapports temporaires ou vers un
      dossier de sortie défini par le client.
    exemplar_query: non applicable
  build_pdf.load_yaml_template:
    display_name: Chargement template rapport YAML
    short_description: Charge et résout les placeholders du template de certification.
    description: Charge le template YAML du rapport de certification et résout les {{ placeholders }} depuis le data_store
      + study_plan. Retourne le template enrichi avec les valeurs réelles, le statut de chaque section (ready / missing_inputs)
      et la liste des champs manquants. Le WriterAgent appelle ce tool en premier pour connaître l'état des données avant
      de décider quelles sections peut-il rédiger.
    domain: mortality_experience
    capability_group: reporting
    depends_on: []
    required_by:
    - build_pdf.assemble_sections
    client_visible: false
    when_to_use: Appeler en tout premier dans la phase de rédaction, avant tout autre tool de rendu. Appelle régulièrement
      pour mettre à jour l'état après chaque calcul supplémentaire.
    when_not_to_use: Ne pas appeler si aucun calcul n'a encore été effectué (data_store vide).
    prerequisites:
      required_tools: []
      required_data_store_keys: []
    params:
      yaml_path:
        type: string
        default: knowledge_base/report_template/mortality_template.yaml
        note: Chemin relatif à la racine du projet.
      study_plan:
        type: dict
        default: '{}'
        note: Paramètres d'étude fournis par le MasterAgent (période, référence, etc.)
    outputs:
      data_store_keys_written:
      - 'template_context   # dict de résolution des placeholders'
      - 'template_sections  # statut par section (ready/missing_inputs)'
      return_payload:
        template_context: 'dict   # {placeholder_name: resolved_value}'
        sections_status: 'list[dict]  # [{section_id, label, ready, missing_inputs}]'
        missing_fields: 'list[str]   # liste globale des champs manquants'
        n_ready: int
        n_total: int
    quality_gates:
      non_blocking:
      - Sections avec missing_inputs → listées dans sections_status, ne bloquent pas
  builder.exposure:
    display_name: Calcul d'exposition (E_x, D_x)
    short_description: Calcule la table d'exposition centrale par âge à partir des données individuelles.
    description: Calcule la table d'exposition centrale par âge (E_x, D_x) à partir des données individuelles du portefeuille.
      Chaque ligne du DataFrame représente un contrat avec des dates d'entrée, de sortie et de naissance. Produit la table
      fondamentale utilisée par tous les outils du pipeline de construction.
    domain: mortality_experience
    capability_group: table_construction
    depends_on: []
    required_by:
    - builder.crude_rates
    - builder.diagnostics
    - builder.validation
    - builder.benchmarking
    - build_pdf.certification_report
    client_visible: true
    when_to_use: Appeler en premier dès que le client demande une construction de table de mortalité d'expérience, un calcul
      de SMR, ou tout pipeline builder. Obligatoire avant tout autre outil builder.
    when_not_to_use: Ne pas appeler pour une analyse descriptive pure (utiliser statistical_analysis). Ne pas relancer sans
      modifier age_min/age_max si une erreur de colonnes est retournée.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
      note: reçoit df (DataFrame) directement, pas de données du data_store.
    params:
      age_min:
        type: int
        values: 0–120
        default: '20'
        note: Âge minimum du domaine d'analyse. Ajuster selon la population du portefeuille.
      age_max:
        type: int
        values: 0–120
        default: '90'
        note: Âge maximum. Réduire si crédibilité faible aux grands âges (voir builder.diagnostics).
      observation_end:
        type: string
        values: date au format DD/MM/YYYY
        default: 31/12/2023
        note: Date de fin d'observation. Les dates de sortie futures sont tronquées à cette date.
    outputs:
      data_store_keys_written:
      - 'exposure_table : list[dict] — une entrée par âge avec age, E_x, D_x, mu_x, q_x_brut'
      - 'age_min        : int — âge minimum effectif'
      - 'age_max        : int — âge maximum effectif'
      - 'total_exposure : float — exposition totale en personne-années'
      - 'total_deaths   : int — nombre total de décès'
      return_payload:
        exposure_table: list[dict] — table principale
        age_min: int
        age_max: int
        total_exposure: float
        total_deaths: int
        lignes_exclues: int — nombre de lignes avec dates non parsables (optionnel)
    quality_gates:
      blocking:
      - Colonnes requises absentes (date_naissance, date_entree, date_sortie, cause_sortie)
      non_blocking:
      - lignes_exclues > 0 → documenter le nombre de lignes exclues dans l'analyse et
    errors:
    - error: 'Colonnes requises absentes : [...]'
      cause: Les colonnes de dates ou cause de sortie ne sont pas détectées dans le CSV.
      action: Consulter le dictionnaire de données avec le client. Ne jamais relancer
    reasoning_hint: Avant d'appeler exposure, vérifier que le dictionnaire de données a été validé avec le client (Étape 0).
      L'age_min et age_max doivent être déterminés après avoir vu la distribution des âges (statistical_analysis.age_distribution).
      Un age_max trop élevé produira des âges avec exposition nulle.
    exemplar_query: Comment choisir age_min et age_max pour un portefeuille prévoyance entreprise ?
  build_pdf.corpus_inventory:
    display_name: Inventaire corpus exemplaires
    short_description: Liste les rapports exemplaires disponibles dans le corpus RAG.
    description: Inventorie le corpus d'exemplaires actuariels disponible dans (base_de_connaissance/exemplaires/chromadb/).
      Retourne la liste des rapports ingérés avec leurs métadonnées clés, dédupliquée par rapport_id. Utile pour vérifier
      la richesse du corpus avant de lancer une recherche sémantique ou avant d'ingérer un nouveau rapport.
    domain: tous
    capability_group: rag
    depends_on: []
    required_by: []
    client_visible: false
    when_to_use: '- En début de session pour vérifier que le corpus contient des exemplaires pertinents (produit similaire,
      méthode similaire). - Avant d''appeler search_exemplars pour choisir des filtres. - Pour diagnostiquer un corpus vide
      ou insuffisant. - Sur demande explicite du client ("quels exemples as-tu ?").'
    when_not_to_use: Ne pas appeler à chaque invocation — une fois par session suffit. Ne pas utiliser comme substitut à search_exemplars
      pour trouver des formulations.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
    params:
      sort_by:
        type: string
        default: '"qualite_exemplaire"'
        note: 'Clé de tri primaire sur les métadonnées. Options :'
      limit:
        type: int
        default: '20'
        note: Nombre maximum de rapports retournés dans la liste.
    outputs:
      data_store_keys_written: []
      return_payload:
        rapports: list de dicts {rapport_id, type_rapport, produit,
        n_rapports: int   — nombre de rapports distincts
        n_chunks_total: int   — nombre total de chunks dans la collection
        warning: string | null
    quality_gates:
      non_blocking:
      - corpus vide → warning "Corpus vide. Utiliser chunk_report.py pour ingérer des exemplaires."
      - n_rapports == 0 après déduplication → warning + rapports vide
    errors:
    - error: Collection exemplaires non disponible
      cause: ChromaDB absent ou chemin invalide
      action: retourner rapports vide + warning, ne pas bloquer
    reasoning_hint: Appeler une fois en début de session si le client demande "quels types de rapports as-tu en exemple ?".
      Les champs qualite_exemplaire et methode_lissage permettent de choisir les filtres les plus pertinents pour search_exemplars.
    exemplar_query: non applicable
  build_pdf.search_exemplars:
    display_name: Recherche exemplaires RAG
    short_description: Recherche sémantique dans le corpus de rapports exemplaires.
    description: Recherche sémantique dans le corpus d'exemplaires de rapports actuariels (base_de_connaissance/exemplaires/chromadb/).
      Retourne les N chunks les plus pertinents avec leurs métadonnées. Utilisé par l'agent avant de rédiger chaque section
      du rapport pour s'appuyer sur des précédents professionnels.
    domain: tous
    capability_group: rag
    depends_on: []
    required_by:
    - build_pdf.certification_report
    client_visible: false
    when_to_use: 'Avant de rédiger le commentary dans certification_report. Obligatoirement aux trois points de jugement :
      - §2 méthode    : query sur le choix de lissage et sa justification - §3 résultats  : query sur l''interprétation SMR
      et des anomalies - §5 conclusion : query sur la formulation des recommandations d''usage'
    when_not_to_use: Ne pas appeler si le corpus est vide — retourner warning sans erreur. Ne pas appeler pour des questions
      méthodologiques techniques — utiliser build_pdf.search_methodology à la place. Ne pas appeler pour des calculs — utiliser
      les tools builder.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
    params:
      query:
        type: string
        note: '>'
      n_results:
        type: int
        default: '3'
        note: 3 suffit pour la plupart des usages. Augmenter à 5 si la query couvre plusieurs angles.
      filters:
        type: dict
        default: '{}'
        note: '>'
    outputs:
      data_store_keys_written: []
      return_payload:
        chunks: list de dicts {chunk_id, section, contenu, score, metadata}
        n_returned: int
        query_used: string
        warning: string | null
    quality_gates:
      blocking:
      - query absente ou vide → retourner erreur "query est requise"
      non_blocking:
      - 'score max < 0.5 → warning "Aucun exemplaire très pertinent trouvé (score max: {score}). Rédiger avec prudence sans
        précédent direct."'
      - corpus vide → warning + chunks vide, continuer sans bloquer
    errors:
    - error: ChromaDB non disponible
      cause: collection non initialisée ou chemin introuvable
      action: 'retourner {"chunks": [], "n_returned": 0, "warning": "Corpus exemplaires non disponible — continuer sans précédent."}'
    reasoning_hint: Appeler ce tool une fois par paragraphe majeur du commentary. Lire le champ "contenu" des chunks retournés
      pour extraire les formulations et la structure — ne pas recopier mot pour mot. Si score < 0.5 sur tous les chunks, signaler
      dans le commentary qu'aucun précédent similaire n'est disponible.
    exemplar_query: non applicable
  build_pdf.search_methodology:
    display_name: Recherche documentation méthodologique
    short_description: Recherche dans la documentation technique actuarielle.
    description: 'Recherche dans la documentation méthodologique actuarielle indexée (base_de_connaissance/methodologie/chromadb/).
      Couvre : lissage, validation statistique, SMR, tests chi-deux, Whittaker-Henderson, splines, intervalles de confiance,
      Kimeldorf-Jones, etc. Distinct de search_exemplars : ici on cherche de la théorie et des formules, pas des exemples
      de rapports rédigés.'
    domain: tous
    capability_group: rag
    depends_on: []
    required_by: []
    client_visible: false
    when_to_use: 'Quand l''agent doit justifier un choix méthodologique dans le rapport : - Choix du paramètre lambda pour
      Whittaker-Henderson - Interprétation d''un test chi-deux ou d''un SMR - Explication d''une méthode de lissage dans la
      section §2 méthode - Formulation des hypothèses d''un test statistique'
    when_not_to_use: Ne pas utiliser pour chercher des formulations de rapport rédigé — utiliser search_exemplars. Ne pas
      utiliser pour des calculs.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
    params:
      query:
        type: string
        note: '>'
      n_results:
        type: int
        default: '3'
        note: Nombre de chunks retournés (1-8).
    outputs:
      data_store_keys_written: []
      return_payload:
        chunks: list de dicts {chunk_id, contenu, score, source}
        n_returned: int
        warning: string | null
    quality_gates:
      blocking:
      - query absente → retourner erreur
      non_blocking:
      - score max < 0.4 → warning "Documentation insuffisante sur ce sujet"
      - corpus vide après tentative d'ingestion auto → warning + chunks vide
    errors:
    - error: Collection méthodologie non disponible
      cause: ChromaDB absent ou chemin invalide
      action: retourner chunks vide + warning, ne pas bloquer
    reasoning_hint: Appeler avant de rédiger §2 méthode pour appuyer la justification du choix de lissage sur une référence
      technique. Les chunks retournés contiennent des extraits du cours ISFA de Planchet sur les méthodes de lissage (Seance6.pdf).
    exemplar_query: non applicable
  builder.precedent_comparison:
    display_name: Comparaison table précédente
    short_description: Compare la table courante avec une table de mortalité précédente.
    description: Compare la table de mortalité lissée courante avec une table précédente (table d'expérience antérieure ou
      table réglementaire). Calcule les ratios qx_courant / qx_precedent par âge, la dérive moyenne et les âges avec des écarts
      significatifs. Permet de mesurer l'évolution de la mortalité entre deux périodes d'observation.
    domain: mortalite
    capability_group: builder
    depends_on:
    - builder.smoothing
    required_by: []
    client_visible: false
    when_to_use: 'Quand le client dispose d''une table d''expérience précédente et souhaite mesurer l''évolution de la mortalité
      dans le temps. Typiquement dans §3 du rapport si deux périodes sont comparables. Optionnel : si la table précédente
      est absente, retourner warning sans bloquer.'
    when_not_to_use: Ne pas utiliser pour comparer avec une table réglementaire de référence (TH00-02, TPRV...) — utiliser
      builder.benchmarking. Ne pas appeler si smoothed_table est absente.
    prerequisites:
      required_tools: []
      required_data_store_keys: []
    params:
      precedent_table:
        type: list[dict]
        note: '>'
      age_min:
        type: int
        default: '20'
        note: Âge minimum pour le calcul des ratios.
      age_max:
        type: int
        default: '90'
        note: Âge maximum pour le calcul des ratios.
      seuil_derive:
        type: float
        default: '0.05'
        note: '>'
    outputs:
      data_store_keys_written: []
      return_payload:
        comparison_table: list[dict] {age, qx_courant, qx_precedent,
        drift_global: float   — dérive relative moyenne en %
        ages_derive_forte: list[int] — âges avec |ratio-1| > seuil_derive
        n_ages_comparables: int
        warning: string | null
    quality_gates:
      blocking:
      - smoothed_table absente → erreur "smoothed_table manquante"
      non_blocking:
      - precedent_table absente → warning + comparison_table vide, continuer
      - plage d'âges communes vide → warning + comparison_table vide
      - ratio infini ou NaN pour un âge → ignorer cet âge, signaler dans warning
    errors:
    - error: smoothed_table manquante
      cause: pipeline incomplet
      action: retourner erreur, demander d'exécuter builder.smoothing d'abord
    reasoning_hint: 'Appeler si et seulement si une table précédente est disponible. Le champ drift_global permet de conclure
      sur la tendance temporelle dans §3 du rapport : valeur négative = amélioration de la mortalité. Les âges_derive_forte
      permettent d''identifier des ruptures locales (ex : changement de comportement sur un segment d''âge).'
    exemplar_query: '"évolution tendance mortalité entre deux périodes d''observation"'
  build_pdf.table_renderer:
    display_name: Rendu table depuis spec YAML
    short_description: Construit un objet ReportLab Table depuis un spec YAML.
    description: Renders data tables from YAML spec + resolved context dict. Called by the WriterAgent for each table element
      in the processing_sequence. Returns (reportlab_table_obj, html_string). If required data is missing, returns (None,
      "") with a warning logged — non-blocking.
    domain: mortality_experience
    capability_group: reporting
    depends_on:
    - build_pdf.load_yaml_template
    required_by:
    - build_pdf.assemble_sections
    client_visible: false
    when_to_use: After build_pdf.load_yaml_template to render each table in the section spec.
    outputs:
      return_payload:
        rl_table: reportlab Table object (or None)
        html: str — HTML table string for display fallback
        warning: str — populated if data missing, empty if success
  builder.cox_regression:
    display_name: Régression de Cox — ratio H/F
    short_description: Estime le Hazard Ratio du sexe sur la mortalité (Poisson).
    description: 'Estime le Hazard Ratio (HR) du sexe sur la mortalité via un modèle de Poisson (équivalent Cox en temps discret).
      Valide que le ratio H/F est biologiquement plausible (HR attendu : 1.5–3.0 pour portefeuilles vie/prévoyance). Nécessite
      le DataFrame individuel + exposure_table.'
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.exposure
    required_by:
    - build_pdf.certification_report
    client_visible: true
    when_to_use: Appeler après builder.exposure pour la section 2 du rapport de certification (statistiques descriptives).
      Sert à confirmer que la différentiation H/F est cohérente avec la littérature actuarielle avant de segmenter les taux.
    when_not_to_use: Ne pas appeler sur un portefeuille monosexe (résultat non applicable). Ne pas utiliser pour comparer
      les taux par âge (utiliser builder.benchmarking).
    prerequisites:
      required_tools:
      - builder.exposure → provides exposure_table (requis)
      required_data_store_keys:
      - exposure_table (requis)
    params:
      col_sex:
        type: string
        default: auto-détecté via column_schema
        note: 'Colonne identifiant le sexe (ex: SEXEREF). Valeurs H/F ou M/F.'
      col_status:
        type: string
        default: auto-détecté via column_schema
        note: Colonne statut de sortie. Valeur décès = 'D' ou '1'.
      col_entry:
        type: string
        default: auto-détecté
        note: Colonne date d'entrée (pour calculer l'exposition individuelle).
      col_exit:
        type: string
        default: auto-détecté
        note: Colonne date de sortie.
      col_birth:
        type: string
        default: auto-détecté
        note: Colonne date de naissance.
      death_value:
        type: string
        default: D
        note: Valeur qui identifie un décès dans col_status.
    outputs:
      data_store_keys_written:
      - cox_regression
      return_payload:
        hazard_ratio: 'float  # HR sexe masculin vs féminin'
        cox_pvalue: float
        deaths_male: int
        deaths_female: int
        exposure_male_py: float
        exposure_female_py: float
        crude_rate_male: float
        crude_rate_female: float
        interpretation: str
    quality_gates:
      blocking:
      - exposure_table absent → retourne erreur
      - col_sex absent du DataFrame → retourne erreur
      non_blocking:
      - HR < 1.0 → mortalité féminine supérieure, inhabituel, signaler
      - HR > 4.0 → ratio très élevé, vérifier la qualité des données
      - p_value > 0.05 → différence non significative (petit effectif probable)
    errors:
    - error: exposure_table manquant. Appeler builder.exposure d'abord.
    - error: Colonne sexe introuvable. Préciser col_sex dans params.
    - error: Aucune colonne date trouvée pour calculer l'exposition.
    reasoning_hint: 'HR attendu pour prévoyance collective : 1.8–2.5 (hommes ~2x plus mortels). HR < 1.5 → portefeuille féminin
      dominant ou erreur de codage. HR > 3.0 → sélection forte ou données de mauvaise qualité. Toujours vérifier les effectifs
      (deaths_male, deaths_female) avant d''interpréter.'
  builder.crude_rates:
    display_name: Estimation des taux bruts de mortalité
    short_description: Calcule q_x bruts par âge (méthode centrale ou binomiale).
    description: 'Estime les taux bruts de mortalité (q_x) par âge à partir de la table d''exposition. Deux méthodes disponibles
      : taux central (μ̂_x = D_x / E_x) ou binomiale. Produit qx_table consommée par builder.smoothing.'
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.exposure
    required_by:
    - builder.smoothing
    client_visible: false
    when_to_use: Appeler immédiatement après builder.exposure dans le pipeline de construction de table. Prérequis systématique
      avant tout lissage.
    when_not_to_use: Ne pas appeler sans exposure_table disponible dans le data_store. Ne pas utiliser pour un simple résumé
      descriptif (pas de construction de table).
    prerequisites:
      required_tools:
      - builder.exposure → provides exposure_table
      required_data_store_keys:
      - exposure_table
    params:
      method:
        type: string
        values: central | binomial
        default: central
        note: '"central" = μ̂_x = D_x/E_x (standard actuariel). "binomial" pour'
    outputs:
      data_store_keys_written:
      - 'qx_table : list[dict] — age, E_x, D_x, qx, method_name par âge'
      - 'method   : str — méthode utilisée'
      return_payload:
        qx_table: list[dict] — table des taux bruts
        method: str
    quality_gates:
      blocking:
      - exposure_table absent → retourne erreur — appeler builder.exposure d'abord.
      non_blocking:
      - Âges avec D_x = 0 ou E_x = 0 → qx = 0 ou indéfini, à noter. Le lissage
    errors:
    - error: exposure_table manquant. Appeler builder.exposure d'abord.
      cause: exposure_table absent du data_store.
      action: Appeler builder.exposure avec les paramètres appropriés, puis relancer.
    reasoning_hint: La méthode "central" est recommandée par défaut. Utiliser "binomial" uniquement si le portefeuille est
      très petit (< 500 contrats) sur recommandation du client. Les âges sans décès auront qx = 0 — c'est normal et sera géré
      par le lissage.
    exemplar_query: Quelle méthode d'estimation des taux bruts choisir pour un portefeuille assurance-vie ?
  builder.diagnostics:
    display_name: Diagnostics de crédibilité
    short_description: Évalue la crédibilité statistique des taux bruts par âge.
    description: 'Diagnostics actuariels sur la table d''exposition : crédibilité statistique par âge, comparaison de méthodes
      de lissage, ou calcul du SMR préliminaire. La fonction "credibility" est la plus couramment appelée avant le lissage.'
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.exposure
    required_by:
    - builder.smoothing
    client_visible: true
    when_to_use: Appeler après builder.exposure pour évaluer la crédibilité des taux bruts avant de choisir la méthode et
      les paramètres de lissage. Indispensable pour décider du lambda Whittaker ou de la plage d'âges.
    when_not_to_use: Ne pas appeler compare_smoothers sans smoothers_dict dans le data_store. Ne pas appeler smr avant d'avoir
      les taux lissés disponibles.
    prerequisites:
      required_tools:
      - builder.exposure → provides exposure_table
      required_data_store_keys:
      - exposure_table
    params:
      function_name:
        type: string
        values: credibility | compare_smoothers | smr
        default: credibility
        note: Utiliser "credibility" systématiquement avant le lissage.
      threshold:
        type: int
        values: 1–100
        default: '10'
        note: Seuil de crédibilité E_x en personne-années. 10 est standard.
      qx_col:
        type: string
        values: q_x_lisse | q_x_brut
        default: q_x_lisse
        note: Colonne q_x pour le calcul SMR. Utiliser q_x_lisse après lissage.
      sexe:
        type: string
        values: H | F
        default: H
        note: Sexe pour la table de référence SMR.
    outputs:
      data_store_keys_written:
      - 'diagnostics : dict — résultat complet selon function_name'
      return_payload: {}
    quality_gates:
      blocking:
      - pct_low_credibility > 30% → AVANT de lancer le lissage, l'agent doit soit
      non_blocking:
      - Âges avec exposition nulle (zero_exposure_ages) → signaler au client
    errors:
    - error: exposure_table manquant. Appeler builder.exposure d'abord.
      cause: exposure_table absent du data_store.
      action: Appeler builder.exposure avant de relancer.
    - error: 'function_name inconnu : ''...'
      cause: Valeur de function_name incorrecte.
      action: 'Utiliser uniquement : credibility, compare_smoothers, smr.'
    reasoning_hint: Appeler systématiquement avec function_name="credibility" après builder.exposure. Si pct_low > 30%, adapter
      age_min/age_max ou choisir lambda_wh ≥ 500. Le résultat "recommendation" donne directement la méthode de lissage conseillée.
    exemplar_query: Comment interpréter pct_low_credibility = 45% dans un portefeuille retraite ?
  builder.smoothing:
    display_name: Lissage des taux de mortalité
    short_description: Produit une courbe q_x régulière et monotone par méthode de lissage.
    description: 'Lisse les taux bruts de mortalité q_x pour produire une courbe régulière et monotone. Quatre méthodes disponibles
      : Whittaker-Henderson (recommandé), Gompertz, Makeham, et spline. Produit smoothed_table utilisée par validation et
      benchmarking.'
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.crude_rates
    required_by:
    - builder.validation
    - builder.benchmarking
    - build_pdf.certification_report
    client_visible: true
    when_to_use: Appeler après builder.crude_rates. Obligatoire avant builder.validation et builder.benchmarking pour un rapport
      complet. Choisir la méthode selon la crédibilité diagnostiquée (résultat de builder.diagnostics).
    when_not_to_use: Ne pas appeler sans qx_table disponible dans le data_store. Ne pas choisir Gompertz/Makeham si la plage
      d'âges est inférieure à 20 ans.
    prerequisites:
      required_tools:
      - builder.crude_rates → provides qx_table
      required_data_store_keys:
      - qx_table
    params:
      method:
        type: string
        values: whittaker | gompertz | makeham | spline
        default: whittaker
        note: Whittaker-Henderson recommandé par défaut. Voir builder.diagnostics
      lambda_wh:
        type: float
        values: 10–10000
        default: '100'
        note: Pénalité de lissage. Augmenter si n_non_monotone > 0 ou si
      d:
        type: int
        values: 1 | 2 | 3
        default: '2'
        note: Ordre de différence Whittaker. 2 est standard (lissage quadratique).
      age_min_fit:
        type: int
        values: 0–120
        default: '40'
        note: Âge de début pour Gompertz/Makeham. Ignorer pour Whittaker/spline.
      age_max_fit:
        type: int
        values: 0–120
        default: '90'
        note: Âge de fin pour Gompertz/Makeham.
    outputs:
      data_store_keys_written:
      - 'smoothed_table : list[dict] — age, q_x_brut, q_x_lisse par âge'
      - 'method         : str — méthode utilisée'
      return_payload:
        smoothed_table: list[dict]
        method: str
        aic_poisson: float — critère AIC (si disponible)
        bic_poisson: float — critère BIC (si disponible)
        n_non_monotone: int — violations de monotonicité après âge 40
    quality_gates:
      blocking:
      - n_non_monotone > 0 après âge 40 → NON ACCEPTABLE pour un rapport final.
      non_blocking:
      - AIC/BIC disponibles → les logger pour comparaison si plusieurs méthodes
    errors:
    - error: qx_table manquant. Appeler builder.crude_rates d'abord.
      cause: qx_table absent du data_store.
      action: Appeler builder.crude_rates avant de relancer.
    - error: 'Méthode inconnue : ''...'
      cause: Valeur de method incorrecte.
      action: 'Utiliser uniquement : whittaker, gompertz, makeham, spline.'
    reasoning_hint: Si diagnostics indique recommendation="whittaker" et pct_low > 20%, commencer avec lambda_wh=200. Si n_non_monotone
      > 0, doubler lambda. La monotonie est obligatoire pour une table de certification. Ne jamais valider une table avec
      des inversions après 40 ans.
    exemplar_query: Quel lambda Whittaker choisir quand 35% des âges sont sous le seuil de crédibilité ?
  graphs.graph_from_spec:
    display_name: Graphique depuis spec YAML
    short_description: Génère un PNG depuis un spec YAML (dispatch ou matplotlib générique).
    description: Generates a PNG graph from a YAML spec + resolved context dict. Dispatches to existing builder_plots tools
      when spec.id matches a known chart type; otherwise builds a generic matplotlib figure. Returns the path to the saved
      PNG file.
    domain: mortality_experience
    capability_group: reporting
    depends_on:
    - build_pdf.load_yaml_template
    required_by:
    - build_pdf.assemble_sections
    client_visible: false
    when_to_use: Called by the WriterAgent for each graph element in the processing_sequence.
    params:
      spec:
        type: dict
        note: Graph spec from the YAML template section.
      context:
        type: dict
        note: Resolved context dict from load_yaml_template.
    outputs:
      return_payload:
        path: str  — absolute path to PNG file
        warning: str  — populated if graph could not be generated
  builder.benchmarking:
    display_name: Benchmarking vs table de référence
    short_description: Calcule facteurs d'abattement et SMR par rapport à une table réglementaire.
    description: Compare la table d'expérience construite avec une table de référence réglementaire (TH0002, TF0002, TD88-90,
      TPRV93). Calcule les facteurs d'abattement par âge et le SMR global (Standardized Mortality Ratio). Étape finale du
      pipeline builder.
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.exposure
    - builder.smoothing
    required_by:
    - build_pdf.certification_report
    client_visible: true
    when_to_use: Appeler après builder.smoothing (avec smoothed_table fortement recommandée) et builder.exposure (exposure_table
      requise). Utiliser "abatement_factors" pour la certification standard. Appeler "load_reference_table" pour inspecter
      une table de référence sans calcul.
    when_not_to_use: Ne pas appeler sans exposure_table. Ne pas comparer avec TF0002 pour un portefeuille hommes (utiliser
      sexe="H" et TH0002).
    prerequisites:
      required_tools:
      - builder.exposure  → provides exposure_table (requis)
      - builder.smoothing → provides smoothed_table (recommandé — utilisé pour q_x_exp)
      required_data_store_keys:
      - exposure_table (requis)
      - smoothed_table (optionnel mais recommandé)
    params:
      function_name:
        type: string
        values: abatement_factors | load_reference_table
        default: abatement_factors
        note: '"abatement_factors" pour la certification. "load_reference_table"'
      reference_name:
        type: string
        values: TH0002 | TF0002 | TD8890 | TPRV93
        default: TH0002
        note: TH0002 pour hommes (table réglementaire française), TF0002 pour femmes.
      sexe:
        type: string
        values: H | F
        default: H
        note: Doit correspondre au portefeuille analysé. Demander au client si mixte.
      qx_exp_col:
        type: string
        values: q_x_lisse | q_x_brut
        default: q_x_lisse
        note: Colonne q_x expérience. Utiliser q_x_lisse si smoothed_table disponible.
    outputs:
      data_store_keys_written:
      - 'benchmarking : dict — résultat complet avec abatement_table, smr_global, etc.'
      return_payload: {}
    quality_gates:
      blocking:
      - exposure_table absent → retourne erreur.
      non_blocking:
      - SMR global < 0.5 → forte sélection (portefeuille assurés ayant passé
      - SMR 0.5–0.8 → sélection modérée. Normal pour prévoyance entreprise.
      - SMR 0.8–1.2 → mortalité proche de la référence. Documenter.
      - SMR > 1.2 → sur-mortalité. Alerter le client et recommander prudence.
    errors:
    - error: exposure_table manquant. Appeler builder.exposure d'abord.
      cause: exposure_table absent du data_store.
      action: Appeler builder.exposure (et idéalement builder.smoothing) avant.
    - error: 'function_name inconnu : ''...'
      cause: Valeur incorrecte.
      action: 'Utiliser uniquement : abatement_factors, load_reference_table.'
    reasoning_hint: 'Toujours vérifier que sexe correspond au portefeuille avant d''appeler. Pour un portefeuille mixte, appeler
      deux fois (H puis F) avec les sous-groupes filtrés, ou signaler au client que le SMR global est une approximation. Interpréter
      le SMR en contexte : < 0.5 = fort effet sélection, 0.5-0.8 = sélection modérée, 0.8-1.2 = proche référence, > 1.2 =
      sur-mortalité.'
    exemplar_query: 'SMR = 0.65 pour un portefeuille prévoyance entreprise : est-ce normal ?'
  builder.logit_regression:
    display_name: Régression logit — positionnement vs référence
    short_description: Ajuste logit(q_exp) ~ logit(q_ref) pour valider la structure.
    description: 'Régression des logits : ajuste une droite entre logit(q_x_exp) et logit(q_x_ref) sur la plage d''âges de
      l''étude. Un R² > 0.99 et une pente proche de 1 confirment que la table d''expérience est structurellement cohérente
      avec la table de référence (même forme de mortalité, écart proportionnel). Étape de validation réglementaire.'
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.smoothing
    - builder.benchmarking
    required_by:
    - build_pdf.certification_report
    client_visible: true
    when_to_use: Appeler après builder.smoothing ET builder.benchmarking pour la section 4.3 du rapport de certification (positionnement
      vs tables réglementaires).
    when_not_to_use: Ne pas appeler si smoothed_table absent (manque de données lissées). Ne pas appeler sans table de référence
      configurée (benchmarking requis). Ne pas interpréter la pente sans regarder R² simultanément.
    prerequisites:
      required_tools:
      - builder.smoothing    → provides smoothed_table
      - builder.benchmarking → provides reference rates
      required_data_store_keys:
      - smoothed_table (requis)
      - benchmarking   (requis — contient les taux de référence par âge)
    params:
      reference_name:
        type: string
        values: TH0002 | TF0002 | TD8890 | TPRV93
        default: TH0002
        note: Doit correspondre à la table utilisée dans builder.benchmarking.
      sexe:
        type: string
        values: H | F
        default: H
      age_min_fit:
        type: int
        default: '30'
        note: Âge minimum pour la régression (exclure les jeunes âges peu crédibles).
      age_max_fit:
        type: int
        default: '80'
        note: Âge maximum pour la régression.
    outputs:
      data_store_keys_written:
      - logit_regression
      return_payload:
        slope_alpha: 'float  # pente — attendu ~0.9–1.1'
        intercept_beta: float
        r_squared: 'float  # attendu > 0.99'
        n_ages: int
        age_min: int
        age_max: int
        formula: 'str    # logit(q_exp) = α × logit(q_ref) + β'
        scatter_data: 'list[dict]  # [{age, logit_exp, logit_ref, logit_fitted}]'
        interpretation: str
    quality_gates:
      blocking:
      - smoothed_table absent → erreur
      - benchmarking absent → erreur
      non_blocking:
      - R² < 0.99 → ajustement insuffisant, signaler (seuil réglementaire ACPR)
      - '|pente - 1| > 0.15 → structure différente de la référence, expliquer'
      - '|intercept| > 0.5  → biais systématique fort, commenter'
    errors:
    - error: smoothed_table manquant. Appeler builder.smoothing d'abord.
    - error: benchmarking manquant. Appeler builder.benchmarking d'abord.
    - error: Moins de 5 âges valides pour la régression.
    reasoning_hint: 'La régression logit est un test de forme, pas de niveau. Pente α ≈ 1 : la structure de mortalité est
      similaire à la référence. Pente α < 0.9 : la mortalité d''expérience croît moins vite avec l''âge. Pente α > 1.1 : elle
      croît plus vite (portefeuille plus âgé). Intercept β capture l''écart de niveau (relié au SMR). Toujours citer R² dans
      le rapport (seuil ACPR implicite : > 0.99).'
  builder.validation:
    display_name: Validation statistique
    short_description: Calcule les intervalles de confiance Poisson et teste l'adéquation statistique.
    description: 'Validation statistique de la table lissée : intervalles de confiance Poisson par âge (IC 95%), ou test chi-carré
      par rapport à une table de référence. Quantifie la fiabilité statistique des taux lissés.'
    domain: mortality_experience
    capability_group: table_construction
    depends_on:
    - builder.exposure
    - builder.smoothing
    required_by:
    - build_pdf.certification_report
    client_visible: true
    when_to_use: Appeler après builder.smoothing (avec smoothed_table disponible). Étape systématique avant la génération
      du rapport de certification. Utiliser "confidence_intervals" par défaut.
    when_not_to_use: Ne pas appeler sans exposure_table. Ne pas appeler si n_non_monotone > 0 (résoudre d'abord la monotonie
      avec builder.smoothing).
    prerequisites:
      required_tools:
      - builder.exposure  → provides exposure_table (requis)
      - builder.smoothing → provides smoothed_table (recommandé fortement)
      required_data_store_keys:
      - exposure_table (requis)
      - smoothed_table (optionnel mais fortement recommandé)
    params:
      function_name:
        type: string
        values: confidence_intervals | chi_square
        default: confidence_intervals
        note: '"confidence_intervals" est le standard pour la certification.'
      alpha:
        type: float
        values: 0.01 | 0.05 | 0.10
        default: '0.05'
        note: Niveau de risque. 0.05 = IC 95% (standard actuariel français).
      qx_col:
        type: string
        values: q_x_lisse | q_x_brut
        default: q_x_lisse
        note: Colonne des taux lissés à valider.
      sexe:
        type: string
        values: H | F
        default: H
        note: Sexe pour la table de référence (chi_square uniquement).
    outputs:
      data_store_keys_written:
      - 'validation : dict — résultat selon function_name'
      return_payload: {}
    quality_gates:
      blocking:
      - exposure_table absent → retourne erreur.
      non_blocking:
      - Pct d'âges dans l'IC < 70% → signaler au client. La table peut manquer
    errors:
    - error: exposure_table manquant. Appeler builder.exposure d'abord.
      cause: exposure_table absent du data_store.
      action: Appeler builder.exposure puis builder.smoothing avant de relancer.
    - error: 'function_name inconnu : ''...'
      cause: Valeur de function_name incorrecte.
      action: 'Utiliser uniquement : confidence_intervals, chi_square.'
    reasoning_hint: Appeler systématiquement avec function_name="confidence_intervals". Si pct dans IC < 70%, noter dans le
      rapport et expliquer au client que certains âges ont peu de données. C'est informatif, pas bloquant.
    exemplar_query: Comment interpréter des intervalles de confiance Poisson très larges aux grands âges ?
  graphs.analysis_plots:
    display_name: Graphiques descriptifs du portefeuille
    short_description: Génère pyramide des âges, séries temporelles et répartitions catégorielles.
    description: 'Génère les graphiques descriptifs du portefeuille : pyramide des âges (avec ou sans ventilation H/F), série
      temporelle annuelle (exposition et décès), et répartitions catégorielles (camemberts). Retourne une image PNG encodée
      en base64.'
    domain: descriptive
    capability_group: graphs
    depends_on:
    - statistical_analysis.age_distribution
    - statistical_analysis.time_series
    - statistical_analysis.segmentation
    required_by: []
    client_visible: true
    when_to_use: Appeler après les outils statistical_analysis correspondants pour visualiser leurs résultats. Intégrer dans
      le rapport descriptif PDF ou afficher dans l'interface. Proposer proactivement après portfolio_summary, age_distribution,
      time_series, ou segmentation.
    when_not_to_use: Ne pas appeler "age_pyramid" sans ages disponible dans le data_store (appeler statistical_analysis.age_distribution
      d'abord).
    prerequisites:
      required_tools:
