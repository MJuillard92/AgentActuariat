    description: 'Enregistre le contenu d''une section du rapport (texte narratif + dernier tableau rendu + dernier graphique
      généré) dans data_store["section_outputs"]. À appeler par le WriterAgent après avoir : 1. Rédigé le texte narratif (dans
      le message LLM) 2. Appelé build_pdf.table_renderer (si la section a des tableaux) 3. Appelé graphs.graph_from_spec (si
      la section a des graphiques) Lit depuis data_store (et les consomme) : - _last_table_rows : list[list[str]] stocké par
