      text:
        type: string
        note: Texte narratif généré par GPT-4o pour cette section.
      table_caption:
        type: string
        default: '""'
        note: Légende du tableau (si _last_table_rows présent).
      graph_caption:
        type: string
        default: '""'
        note: Légende du graphique (si _last_graph_path présent).
      status:
        type: string
        default: done
        note: Statut de la section (done | skipped | partial).
      clear:
        type: bool
        default: 'false'
        note: True pour réinitialiser la section (repartir de zéro).
    outputs:
      data_store_keys_written:
      - 'section_outputs  # dict {section_id: {text, tables, table_captions, graphs, graph_captions, status}}'
      return_payload:
        success: bool
        section_id: str
        text_len: int
        n_tables: int
        n_graphs: int
        status: str
  build_pdf.descriptive_report:
    display_name: Rapport PDF descriptif
    short_description: Génère un rapport PDF de l'analyse descriptive du portefeuille.
    description: 'Génère un rapport PDF descriptif du portefeuille à partir des résultats des outils statistical_analysis.
      Contient : résumé global, distribution des âges, évolution annuelle, segmentation, et commentaires narratifs. Au minimum,
      summary (portfolio_summary) est requis.'
    domain: descriptive
    capability_group: reporting
    depends_on:
    - statistical_analysis.portfolio_summary
    - statistical_analysis.age_distribution
    - statistical_analysis.time_series
    - statistical_analysis.segmentation
    required_by: []
    client_visible: true
    when_to_use: Appeler après avoir exécuté les outils statistical_analysis souhaités et après validation du plan du rapport
      avec le client. Permet de synthétiser une analyse descriptive complète dans un document PDF professionnel.
    when_not_to_use: Ne pas appeler si aucun résultat de statistical_analysis n'est disponible. Ne pas appeler avant que le
      client ait validé le contenu à inclure.
    prerequisites:
      required_tools:
      - statistical_analysis.portfolio_summary → provides summary (REQUIS AU MINIMUM)
      - statistical_analysis.age_distribution → provides ages (optionnel)
      - statistical_analysis.time_series → provides series (optionnel)
      - statistical_analysis.segmentation → provides segmentation (optionnel)
      required_data_store_keys:
      - summary (requis au minimum)
      - ages, series, segmentation (optionnels — sections conditionnelles)
    params:
      output_path:
        type: string
        values: chemin de fichier
        default: /tmp/rapport_descriptif.pdf
        note: L'interface gère le téléchargement. Ne pas exposer au client.
      title:
        type: string
        values: texte libre
        default: '"Analyse descriptive du portefeuille"'
        note: Personnaliser avec le nom du portefeuille du client.
    outputs:
      data_store_keys_written: []
      return_payload:
        succes: bool
        output_path: str
        nb_pages_estimees: int
    quality_gates:
      blocking:
      - Aucune donnée statistical_analysis dans data_store → rapport vide ou erreur.
      non_blocking:
      - Sections optionnelles absentes → rapport généré sans ces sections.
    errors:
    - error: 'ReportLab non disponible : ...'
      cause: Bibliothèque reportlab non installée.
      action: Signaler l'erreur technique. Ne pas relancer sans résoudre.
    reasoning_hint: 'Proposer le rapport descriptif à la fin d''une analyse statistique. Inclure tous les résultats disponibles
      (summary, ages, series, segmentation). Ne jamais mentionner le chemin de fichier dans la réponse au client. Dire simplement
      : "Le rapport a été généré. Le téléchargement démarre automatiquement."'
    exemplar_query: Quelles sections inclure dans un rapport descriptif d'un portefeuille prévoyance ?
  graphs.builder_plots:
    display_name: Graphiques de construction de table
    short_description: Génère les visualisations actuarielles du pipeline builder (exposition, taux, SMR).
