    depends_on:
    - builder.exposure
    - builder.smoothing
    - builder.diagnostics
    - builder.benchmarking
    - builder.validation
    required_by: []
    client_visible: true
    when_to_use: Appeler après les étapes du pipeline builder pour visualiser les résultats. Intégrer dans le rapport PDF
      ou afficher directement dans l'interface. Recommandé après chaque étape clé (exposure, smoothing, benchmarking).
    when_not_to_use: Ne pas appeler sans les données requises pour le chart choisi. Ne pas appeler "smr" sans résultat de
      builder.diagnostics (function_name=smr).
    prerequisites:
      required_tools:
      - exposure → builder.exposure (exposure_table)
      - crude_smoothed → builder.exposure + builder.smoothing
      - smr → builder.diagnostics (function_name=smr)
      - ci_bands → builder.exposure + builder.smoothing + builder.validation
      - survival_curve → builder.exposure + builder.smoothing
      - abatement_chart → builder.benchmarking (abatement_table)
      required_data_store_keys: []
    params:
      chart:
        type: string
        values: exposure | crude_smoothed | smr | ci_bands | survival_curve | abatement_chart
        default: exposure
        note: Choisir selon les données disponibles dans le data_store.
      sexe:
        type: string
        values: H | F
        default: H
        note: Pour les graphiques incluant une courbe de référence TH/TF.
      title_suffix:
        type: string
        values: texte libre
        default: '""'
        note: 'Texte ajouté au titre du graphique (ex: "— Portefeuille retraite").'
    outputs:
      data_store_keys_written: []
      return_payload:
        chart: str — type de graphique produit
    quality_gates:
      blocking:
      - Données requises absentes → retourne erreur avec indication du tool à appeler.
      non_blocking:
      - 'Graphique produit mais vide (ex: aucun abatement_factor) → avertir le client.'
    errors:
    - error: exposure_table manquant. Appeler builder.exposure d'abord.
      cause: Données requises pour ce chart absentes du data_store.
      action: Appeler le tool indiqué dans le message d'erreur.
    - error: 'chart inconnu : ''...'
      cause: Valeur de chart incorrecte.
      action: 'Utiliser uniquement : exposure, crude_smoothed, smr, ci_bands,'
    reasoning_hint: 'Après chaque étape du pipeline builder, proposer le graphique correspondant : exposure → chart="exposure",
      smoothing → chart="crude_smoothed", benchmarking → chart="abatement_chart". Les graphiques enrichissent le rapport PDF
      et aident le client à comprendre les résultats.'
    exemplar_query: Quels graphiques inclure dans un rapport de certification de table de mortalité ?
  build_pdf.certification_report:
    display_name: Rapport PDF de certification
    short_description: Génère le rapport de certification de la table de mortalité d'expérience.
    description: 'Génère un rapport PDF de certification actuarielle complet de la table de mortalité d''expérience. Contient
      : pipeline utilisé, table complète avec taux bruts et lissés, diagnostics de crédibilité, intervalles de confiance,
      facteurs d''abattement vs référence, SMR global, graphiques intégrés, et conclusion.'
    domain: mortality_experience
    capability_group: reporting
    depends_on:
    - builder.exposure
    - builder.crude_rates
    - builder.smoothing
    - builder.diagnostics
    - builder.validation
    - builder.benchmarking
    required_by: []
    client_visible: true
    when_to_use: Appeler après validation du plan du rapport avec le client. Exige au minimum exposure_table. Les autres sections
      (smoothing, diagnostics, validation, benchmarking) sont optionnelles mais fortement recommandées pour un rapport complet.
    when_not_to_use: Ne pas appeler si exposure_table est absent (retourne erreur). Ne pas appeler avant que le client ait
      validé le plan du rapport (voir step4). Ne pas appeler si n_non_monotone > 0 (résoudre la monotonie d'abord).
    prerequisites:
      required_tools:
      - builder.exposure → provides exposure_table (REQUIS)
      - builder.crude_rates → provides qx_table (recommandé)
      - builder.smoothing → provides smoothed_table (recommandé)
      - builder.diagnostics → provides diagnostics (recommandé)
      - builder.validation → provides validation (recommandé)
      - builder.benchmarking → provides benchmarking (recommandé)
      required_data_store_keys:
      - exposure_table (REQUIS)
      - smoothed_table (optionnel — section taux lissés)
      - diagnostics (optionnel — section crédibilité)
      - validation (optionnel — section validation)
      - benchmarking (optionnel — section abattement)
    params:
      output_path:
        type: string
        values: chemin de fichier
        default: /tmp/rapport_certification.pdf
        note: L'interface gère le téléchargement. Ne pas exposer au client.
      title:
        type: string
        values: texte libre
        default: '"Table de mortalité d''expérience — Certification"'
        note: 'Personnaliser avec le nom du portefeuille (ex: "Portefeuille Retraite 2024").'
      portfolio_info:
        type: string
        values: texte court
        default: '""'
        note: 'Description courte (ex: "45 231 lignes, 2010-2023, produit prévoyance").'
      sexe:
        type: string
        values: H | F
        default: H
        note: Doit correspondre au portefeuille analysé.
      commentary:
        type: string
        default: '""'
        note: '>'
    outputs:
      data_store_keys_written: []
      return_payload:
        succes: bool
        output_path: str
        nb_pages_estimees: int
    quality_gates:
      blocking:
      - exposure_table absent → retourne erreur. Appeler builder.exposure d'abord.
      - n_non_monotone > 0 dans smoothed_table → bloquer la génération.
      - commentary absent ou vide → l'agent doit rédiger l'analyse
      non_blocking:
      - Sections optionnelles absentes → le rapport est généré sans ces sections
    errors:
    - error: exposure_table manquant dans data_store.
      cause: exposure_table absent. Pipeline builder incomplet.
      action: Appeler builder.exposure → crude_rates → smoothing avant de générer.
    - error: 'ReportLab non disponible : ...'
      cause: Bibliothèque reportlab non installée.
      action: Signaler l'erreur technique. Ne pas relancer sans résoudre.
    reasoning_hint: 'Étape obligatoire avant d''appeler ce tool : 1. Lire dans le data_store : smr_global (benchmarking),
      n_non_monotone (smoothed_table), ages peu crédibles (diagnostics), intervalles de confiance (validation). 2. Croiser
      ces signaux : - SMR global hors [0.85, 1.15] → anomalie à expliquer en §3 - n_non_monotone > 0 → BLOQUER (voir quality
      gates) - Plus de 20% des âges peu crédibles → renforcer §4 limites - IC larges sur âges extrêmes → mentionner en §4
      3. Rédiger le commentary (§1 à §5) en s''appuyant sur ces signaux. 4. Choisir les graphiques à inclure : - smr_by_decile    :
      TOUJOURS si smr_global hors [0.85, 1.15] - confidence_bands : TOUJOURS si âges peu crédibles présents - credibility_heatmap
      : si plus de 20% des âges peu crédibles - abatement_curve  : si benchmarking disponible Chaque graphique inclus doit
      être référencé dans le commentary. 5. Seulement après ces étapes : appeler ce tool.'
    exemplar_query: 'Utiliser ces queries contre le corpus RAG exemplaires avant de rédiger chaque paragraphe du commentary
      : - §2 méthode : "justification choix lissage whittaker portefeuille [taille]" - §3 résultats : "interprétation SMR
      [valeur] rapport certification mortalité" - §4 limites : "formulation limites âges peu crédibles rapport actuariel"
      - §5 conclusion : "recommandation usage table mortalité expérience tarification"'
