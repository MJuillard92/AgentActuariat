        default: age_pyramid
        note: Choisir selon les données disponibles dans le data_store.
      title_suffix:
        type: string
        values: texte libre
        default: '""'
        note: Texte ajouté au titre du graphique.
      by_sex:
        type: bool
        values: true | false
        default: 'false'
        note: Si true, affiche la pyramide séparée H/F.
    outputs:
      data_store_keys_written: []
      return_payload:
        chart: str — type de graphique produit
    quality_gates:
      blocking:
      - Données requises absentes → retourne erreur avec indication du tool à appeler.
    errors:
    - error: Données ages manquantes dans data store. Appeler statistical_analysis.age_distribution d'abord.
      cause: ages absent du data_store.
      action: Appeler statistical_analysis.age_distribution avant de relancer.
    - error: 'chart inconnu : ''...'
      cause: Valeur de chart incorrecte.
      action: 'Utiliser uniquement : age_pyramid, time_series, segmentation.'
    reasoning_hint: Proposer systématiquement les graphiques descriptifs après chaque outil statistical_analysis. age_pyramid
      après age_distribution, time_series après time_series, segmentation après segmentation.
    exemplar_query: Quels graphiques descriptifs proposer en début d'analyse actuarielle ?
  build_pdf.assemble_sections:
