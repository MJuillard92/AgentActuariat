# ─────────────────────────────────────────────────────────────────────────
# mortality_template.yaml — Design 3 (ADR squishy-jingling-koala v3)
#
# Structure racine :
#   session_inputs   : entrées fournies par l'utilisateur à t=0
#   data_contract    : toutes les grandeurs produites (master_from_data,
#                      master_from_modeling, builder_outputs)
#   sections         : purement rédactionnel (narrative + llm_directives +
#                      visual_specs)
#
# Fil rouge : seule la section `preamble` est active. Les autres sections
# (construction, analysis, results, conclusion, annex) seront réintroduites
# une par une après E2E preamble vert (US-26+).
# ─────────────────────────────────────────────────────────────────────────

session_inputs:
  - key: raw_user_request
    type: string
    required: true
    description: "Demande utilisateur en langage naturel à l'ouverture de session."
    example: "Construis-moi une table de mortalité sur mon portefeuille temporaire décès."

  - key: input_records
    type: table
    required: true
    description: >
      Fichier individuel (un record = un contrat/vie). Le Master normalise
      en interne (column_mapping + value_mapping) avant consommation.
    shape:
      - {key: date_naissance, type: date, format: "YYYY-MM-DD"}
      - {key: date_entree,    type: date, format: "YYYY-MM-DD"}
      - {key: date_sortie,    type: date, format: "YYYY-MM-DD"}
      - {key: cause_sortie,   type: enum, allowed: [deces, autre, sans_objet]}
      - {key: sexe,           type: enum, allowed: [H, F]}


data_contract:

  # ─── Inférences factuelles (Master, tools déterministes) ──────────────
  master_from_data:
    - key: observation_period_years
      type: list[integer]
      description: "Années couvertes par les données (premier → dernier décès)."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {period_years: observation_period_years}
      confirm_with_user: true

    - key: start_year
      type: integer
      description: "Année du premier décès observé."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {first_death_year: start_year}
      confirm_with_user: true

    - key: end_year
      type: integer
      description: "Année du dernier décès observé."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {last_death_year: end_year}
      confirm_with_user: true

    - key: num_observation_years
      type: integer
      description: "Nombre d'années couvertes (end_year - start_year + 1)."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {n_years: num_observation_years}
      confirm_with_user: true


  # ─── Choix méthodologiques (Master + dialogue 3-modes) ────────────────
  master_from_modeling:
    - key: study_objective
      type: enum
      allowed: [construction_table_mortalite]
      description: "Objectif méthodologique de l'étude."
      produced_by:
        tool: master.classify_request
        inputs: {request: raw_user_request}
        output_mapping: {objective: study_objective}
      confirm_with_user: false

    - key: gender_segmentation
      type: enum
      allowed: [unisex, by_sex]
      description: "Table unisex agrégée vs tables séparées H/F."
      produced_by:
        tool: master.classify_request
        inputs: {request: raw_user_request}
        output_mapping: {gender_mode: gender_segmentation}
      confirm_with_user: true


  # ─── Clés consommées par le Writer (produites par des tools existants) ─
  builder_outputs:
    - key: cleaned_records
      type: table
      description: "Records après retraitement (R1–R6)."
      produced_by:
        tool: preprocessing.clean_records
        inputs: {}
        output_mapping: {cleaned_records: cleaned_records}

    - key: exclusion_report
      type: dict
      description: "Rapport des exclusions : initial_count, final_count, rules."
      produced_by:
        tool: preprocessing.clean_records
        inputs: {}
        output_mapping: {exclusion_report: exclusion_report}

    - key: total_records
      type: integer
      description: "Nombre de lignes post-retraitement (= exclusion_report.final_count)."
      produced_by:
        tool: preprocessing.clean_records
        inputs: {}
        output_mapping: {total_records: total_records}

    - key: total_exposure
      type: number
      unit: "années-personne"
      description: "Exposition totale sommée sur la période d'observation."
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {total_exposure: total_exposure}

    - key: total_deaths
      type: integer
      description: "Nombre total de décès observés sur la période."
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {total_deaths: total_deaths}

    - key: segmentations
      type: dict
      description: >
        Résultat complet de statistical_analysis.segmentation : dict keyé par
        variable catégorielle (sexe, produit, cause_sortie…), chaque valeur est
        une list[{valeur, nb_contrats, nb_deces, pct_contrats, pct_deces}].
        Le visual_spec preamble extrait la clé 'sexe' via sub-path.
      produced_by:
        tool: statistical_analysis.segmentation
        inputs: {records: cleaned_records}
        output_mapping: {segmentations: segmentations}

    - key: serie
      type: list[dict]
      description: >
        Série temporelle annuelle : list[{annee, nb_entres, nb_deces,
        exposition_pa}] produite par statistical_analysis.time_series.
      produced_by:
        tool: statistical_analysis.time_series
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {serie: serie}

    - key: serie_h
      type: list[dict]
      description: "Série temporelle ventilée — hommes."
      produced_by:
        tool: statistical_analysis.time_series
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {serie_h: serie_h}

    - key: serie_f
      type: list[dict]
      description: "Série temporelle ventilée — femmes."
      produced_by:
        tool: statistical_analysis.time_series
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {serie_f: serie_f}

    - key: ages
      type: dict
      description: >
        Résultat complet age_distribution (age_min, age_max, distribution_list,
        distribution_list_h, distribution_list_f, …).
      produced_by:
        tool: statistical_analysis.age_distribution
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {ages: ages}


# ─────────────────────────────────────────────────────────────────────────
# Sections — purement rédactionnel
# ─────────────────────────────────────────────────────────────────────────
sections:

  - id: preamble
    label: "Préambule"
    required: true
    dependencies: []
    activation:
      report_mode: [full_report, raw_rates, description]

    narrative:
      text: |
        Ce rapport présente {{ study_objective }} construite à partir
        d'un portefeuille observé de {{ start_year }} à {{ end_year }},
        soit {{ num_observation_years }} années. L'étude porte sur une
        exposition totale de {{ total_exposure }} années-personne
        et {{ total_deaths }} décès observés.

        D'une manière synthétique,l'étude réalisée peut se résumer de la
        sorte : analyse statistique du portefeuille assuré, calcul des taux
        bruts par application de la méthologie de Kaplan Meier, lissage des
        taux bruts puis backetsting du niveau global de pruduence.

    llm_directives:
      tone: "neutre, descriptif, factuel"
      length_words: [300, 400]
      rag_query: "formulation préambule table mortalité portefeuille"

    visual_specs:
      - id: portfolio_composition
        type: table
        purpose: "Décrire la composition du portefeuille observé par sexe."
        source: segmentations.sexe   # sub-path dans le dict `segmentations`
        columns:
          - {key: valeur,         label: "Sexe"}
          - {key: nb_contrats,    label: "Nombre de vies",   format: int}
          - {key: nb_deces,       label: "Décès",            format: int}
          - {key: pct_contrats,   label: "Part du portefeuille (%)", format: float2}
          - {key: pct_deces,      label: "Part des décès (%)",       format: float2}

      - id: deaths_per_year
        type: chart
        chart_type: bar
        purpose: "Nombre de décès observés par année calendaire."
        source: serie
        x_axis: {key: annee,    label: "Année"}
        y_axis: {key: nb_deces, label: "Décès"}

  - id: data_preprocessing
    label: "Retraitement des données"
    required: true
    dependencies: [preamble]
    activation:
      report_mode: [full_report, raw_rates, description]

    narrative:
      text: |
        L'objet de cette section est de décrire les retraitements appliqués
        à la base initiale afin de mener les travaux de certification de la
        table d'expérience. De manière synthétique, les retraitements
        consistent à supprimer les contrats sans effet et les données
        aberrantes. Le détail des lignes exclues est donné ci-après.

    llm_directives:
      tone: "professionnel, actuariel, descriptif"
      length_words: [100, 180]
      rag_query: "retraitement données aberrantes portefeuille mortalité"

      post_table_analysis:
        instruction: >
          À partir de la table d'exclusions, produire 2 à 4 bullets :
          (1) identifier les règles qui ont le plus d'impact en volume ;
          (2) si une règle exclut > 10% de la base initiale, commenter
          spécifiquement (plausibilité actuarielle, qualité de données) ;
          (3) conclure sur la base finale conservée.
          Style factuel.
        length_words: [60, 120]
        few_shot_example: |
          - la règle "âge à la sortie < âge à l'entrée" exclut le plus de
            lignes, traduisant une saisie inversée récurrente ;
          - les règles d'âges > 100 ans n'excluent aucune ligne, indiquant
            une base cohérente sur ce critère ;
          - la base finale conserve {{ exclusion_report.final_count }} lignes
            sur {{ exclusion_report.initial_count }} initiales.

    visual_specs:
      - id: exclusion_table
        type: table
        purpose: "Détail des exclusions par règle appliquée."
        source: exclusion_report.rules
        columns:
          - {key: rule_label, label: "Règle appliquée"}
          - {key: count,      label: "Nombre de lignes supprimées", format: int}
        highlight_rule: totals_row

  - id: data_analysis_unisex
    label: "Analyse des données — base agrégée"
    required: true
    dependencies: [data_preprocessing]
    activation:
      report_mode: [full_report, raw_rates, description]
      gender_segmentation: [unisex]

    narrative:
      text: |
        La base de données utilisée regroupe {{ total_records }} lignes,
        réparties sur {{ num_observation_years }} années d'observation,
        conduisant à {{ total_exposure }} années-personne. Une analyse
        statistique annuelle est présentée ci-après.

    llm_directives:
      tone: "professionnel, actuariel, descriptif"
      length_words: [120, 200]
      rag_query: "présentation base données mortalité effectifs observation"

      post_table_analysis:
        instruction: >
          À partir du tableau annuel, produire 3 à 5 bullets analysant
          l'évolution. Pour chaque bullet : (1) constater la tendance
          avec valeurs saillantes ; (2) proposer une explication probable,
          métier (montée en puissance, changement de cible) ou statistique
          (faiblesse des effectifs, variance). Style actuariel, factuel.
        length_words: [80, 150]
        few_shot_example: |
          - forte croissance de l'exposition, traduisant une montée en
            puissance de la commercialisation ;
          - taux de décès annuel très volatil, s'expliquant par la faiblesse
            de l'effectif sur les premières années ;
          - âge moyen à l'entrée relativement stable ;
          - âge moyen au décès volatil.

    visual_specs:
      - id: annual_statistics
        type: table
        purpose: "Statistiques annuelles agrégées."
        source: serie
        columns:
          - {key: annee,            label: "Année",                        format: int}
          - {key: exposition_pa,    label: "Exposition (années-personne)", format: float2}
          - {key: age_moyen_entres, label: "Âge moyen",                    format: float2}
          - {key: nb_deces,         label: "Nombre de décès",              format: int}
          - {key: taux_deces,       label: "Taux de décès (‰ PA)",         format: float2}
          - {key: age_moyen_deces,  label: "Âge moyen au décès",           format: float2}
        highlight_rule: totals_row

      - id: exposure_distribution_by_age
        type: chart
        chart_type: bar
        purpose: "Distribution des âges à l'entrée par tranches."
        source: ages.distribution_list
        x_axis: {key: tranche,     label: "Âge (tranches)"}
        y_axis: {key: nb_contrats, label: "Effectif"}

  - id: data_analysis_by_sex
    label: "Analyse des données — ventilation par sexe"
    required: true
    dependencies: [data_preprocessing]
    activation:
      report_mode: [full_report, raw_rates, description]
      gender_segmentation: [by_sex]

    narrative:
      text: |
        La base de données utilisée regroupe {{ total_records }} lignes,
        réparties sur {{ num_observation_years }} années d'observation,
        conduisant à {{ total_exposure }} années-personne. L'étude étant
        conduite par sexe, les statistiques annuelles et la distribution
        des âges sont présentées séparément pour les hommes et les femmes.

    llm_directives:
      tone: "professionnel, actuariel, descriptif"
      length_words: [150, 250]
      rag_query: "analyse par sexe mortalité effectifs portefeuille"

      post_table_analysis:
        instruction: >
          À partir des deux tableaux annuels (H et F), produire 4 à 6 bullets
          analysant l'évolution pour chaque sexe ET comparant les tendances
          entre sexes. Pour chaque constat : (1) valeur saillante ;
          (2) explication probable (métier ou statistique). Mettre en
          évidence les écarts H/F significatifs.
        length_words: [120, 200]
        few_shot_example: |
          - exposition masculine en forte croissance, exposition féminine
            stable, traduisant une cible commerciale majoritairement masculine ;
          - taux de décès systématiquement supérieur chez les hommes
            (ratio ~2:1), cohérent avec la littérature actuarielle ;
          - âge moyen au décès plus élevé chez les femmes ;
          - volatilité des taux comparable entre sexes sur la période.

    visual_specs:
      - id: annual_statistics_male
        type: table
        purpose: "Statistiques annuelles — hommes."
        source: serie_h
        columns:
          - {key: annee,            label: "Année",                        format: int}
          - {key: exposition_pa,    label: "Exposition (années-personne)", format: float2}
          - {key: age_moyen_entres, label: "Âge moyen",                    format: float2}
          - {key: nb_deces,         label: "Nombre de décès",              format: int}
          - {key: taux_deces,       label: "Taux de décès (‰ PA)",         format: float2}
          - {key: age_moyen_deces,  label: "Âge moyen au décès",           format: float2}
        highlight_rule: totals_row

      - id: annual_statistics_female
        type: table
        purpose: "Statistiques annuelles — femmes."
        source: serie_f
        columns:
          - {key: annee,            label: "Année",                        format: int}
          - {key: exposition_pa,    label: "Exposition (années-personne)", format: float2}
          - {key: age_moyen_entres, label: "Âge moyen",                    format: float2}
          - {key: nb_deces,         label: "Nombre de décès",              format: int}
          - {key: taux_deces,       label: "Taux de décès (‰ PA)",         format: float2}
          - {key: age_moyen_deces,  label: "Âge moyen au décès",           format: float2}
        highlight_rule: totals_row

      - id: exposure_distribution_male
        type: chart
        chart_type: bar
        purpose: "Distribution des âges — hommes."
        source: ages.distribution_list_h
        x_axis: {key: tranche,     label: "Âge (tranches)"}
        y_axis: {key: nb_contrats, label: "Effectif"}

      - id: exposure_distribution_female
        type: chart
        chart_type: bar
        purpose: "Distribution des âges — femmes."
        source: ages.distribution_list_f
        x_axis: {key: tranche,     label: "Âge (tranches)"}
        y_axis: {key: nb_contrats, label: "Effectif"}


