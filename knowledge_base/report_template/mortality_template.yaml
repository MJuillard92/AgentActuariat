# ─────────────────────────────────────────────────────────────────────────
# mortality_template.yaml — Design 3 (ADR squishy-jingling-koala v3)
#
# Structure racine :
#   formats          : formats par défaut pour les cellules de tableaux,
#                      séparateur de milliers, affichage des NaN
#   session_inputs   : entrées fournies par l'utilisateur à t=0
#   data_contract    : toutes les grandeurs produites (master_from_data,
#                      master_from_modeling, builder_outputs)
#   sections         : purement rédactionnel (narrative + llm_directives +
#                      visual_specs)
# ─────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────
# Formats globaux des tableaux. Source unique de vérité pour le rendu :
#   - defaults    : format implicite par clé canonique (utilisé si le
#                   visual_spec ne précise pas format inline)
#   - na_display  : chaîne affichée à la place des NaN/None
#   - number_separator : séparateur de milliers dans les nombres ≥ 1000
# ─────────────────────────────────────────────────────────────────────────
formats:
  defaults:
    age:                   int
    age_min:               int
    age_max:               int
    annee:                 int
    qx:                    float4
    q_x:                   float4
    q_x_brut:              float4
    q_x_lisse:             float4
    E_x:                   float2
    D_x:                   int
    exposition_pa:         float2
    nb_contrats:           int
    nb_deces:               int
    nb_entres:              int
    taux_deces:            float2
    age_moyen:             float2
    age_moyen_entres:      float2
    age_moyen_deces:       float2
    pct_contrats:          float1
    pct_deces:             float1
    proportion:            float1
    E_x_sum:               float2
    D_x_observed:          int
    D_x_predicted:         float2
    ecart:                 float2
    ecart_pct:             float1
    ci_lower:              float2
    ci_upper:              float2
    total_exposure:        float2
    total_deaths:          int
    total_records:         int
    count:                 int
  na_display: "—"
  number_separator: " "

session_inputs:
  - key: raw_user_request
    type: string
    required: true
    description: "Demande utilisateur en langage naturel à l'ouverture de session."
    example: "Construis-moi une table de mortalité sur mon portefeuille temporaire décès."

  - key: input_records
    type: table
    required: true
    description: >
      Fichier individuel (un record = un contrat/vie). Le Master normalise
      en interne (column_mapping + value_mapping) avant consommation.
    shape:
      - {key: date_naissance, type: date, format: "YYYY-MM-DD"}
      - {key: date_entree,    type: date, format: "YYYY-MM-DD"}
      - {key: date_sortie,    type: date, format: "YYYY-MM-DD"}
      - {key: cause_sortie,   type: enum, allowed: [deces, autre, sans_objet]}
      - {key: sexe,           type: enum, allowed: [H, F]}


data_contract:

  # ─── Inférences factuelles (Master, tools déterministes) ──────────────
  master_from_data:
    - key: observation_period_years
      type: list[integer]
      description: "Années couvertes par les données (premier → dernier décès)."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {period_years: observation_period_years}
      confirm_with_user: true

    - key: start_year
      type: integer
      description: "Année du premier décès observé."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {first_death_year: start_year}
      confirm_with_user: true

    - key: end_year
      type: integer
      description: "Année du dernier décès observé."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {last_death_year: end_year}
      confirm_with_user: true

    - key: num_observation_years
      type: integer
      description: "Nombre d'années couvertes (end_year - start_year + 1)."
      produced_by:
        tool: master.analyze_data_and_request
        inputs: {records: input_records}
        output_mapping: {n_years: num_observation_years}
      confirm_with_user: true


  # ─── Choix méthodologiques (Master + dialogue 3-modes) ────────────────
  master_from_modeling:
    - key: study_objective
      type: enum
      allowed: [construction_table_mortalite]
      description: "Objectif méthodologique de l'étude."
      produced_by:
        tool: master.classify_request
        inputs: {request: raw_user_request}
        output_mapping: {objective: study_objective}
      confirm_with_user: false

    - key: gender_segmentation
      type: enum
      allowed: [unisex, by_sex]
      description: "Table unisex agrégée vs tables séparées H/F."
      produced_by:
        tool: master.classify_request
        inputs: {request: raw_user_request}
        output_mapping: {gender_mode: gender_segmentation}
      confirm_with_user: true


  # ─── Clés consommées par le Writer (produites par des tools existants) ─
  builder_outputs:
    - key: cleaned_records
      type: table
      description: "Records après retraitement (R1–R6)."
      produced_by:
        tool: preprocessing.clean_records
        inputs: {}
        output_mapping: {cleaned_records: cleaned_records}

    - key: exclusion_report
      type: dict
      description: "Rapport des exclusions : initial_count, final_count, rules."
      produced_by:
        tool: preprocessing.clean_records
        inputs: {}
        output_mapping: {exclusion_report: exclusion_report}

    - key: total_records
      type: integer
      description: "Nombre de lignes post-retraitement (= exclusion_report.final_count)."
      produced_by:
        tool: preprocessing.clean_records
        inputs: {}
        output_mapping: {total_records: total_records}

    - key: total_exposure
      type: number
      unit: "années-personne"
      description: "Exposition totale sommée sur la période d'observation."
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {total_exposure: total_exposure}

    - key: exposure_table
      type: list[dict]
      description: >
        Table d'exposition par âge entier : age, E_x, D_x. Produite par
        builder.exposure (étape intermédiaire), consommée par
        builder.crude_rates pour calculer q_x = D_x / E_x.
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {exposure_table: exposure_table}

    - key: total_deaths
      type: integer
      description: "Nombre total de décès observés sur la période."
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {total_deaths: total_deaths}

    - key: segmentations
      type: dict
      description: >
        Résultat complet de statistical_analysis.segmentation : dict keyé par
        variable catégorielle (sexe, produit, cause_sortie…), chaque valeur est
        une list[{valeur, nb_contrats, nb_deces, pct_contrats, pct_deces}].
        Le visual_spec preamble extrait la clé 'sexe' via sub-path.
      produced_by:
        tool: statistical_analysis.segmentation
        inputs: {records: cleaned_records}
        output_mapping: {segmentations: segmentations}

    - key: serie
      type: list[dict]
      description: >
        Série temporelle annuelle : list[{annee, nb_entres, nb_deces,
        exposition_pa}] produite par statistical_analysis.time_series.
      produced_by:
        tool: statistical_analysis.time_series
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {serie: serie}

    - key: serie_h
      type: list[dict]
      description: "Série temporelle ventilée — hommes."
      produced_by:
        tool: statistical_analysis.time_series
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {serie_h: serie_h}

    - key: serie_f
      type: list[dict]
      description: "Série temporelle ventilée — femmes."
      produced_by:
        tool: statistical_analysis.time_series
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {serie_f: serie_f}

    - key: ages
      type: dict
      description: >
        Résultat complet age_distribution (age_min, age_max, distribution_list,
        distribution_list_h, distribution_list_f, …).
      produced_by:
        tool: statistical_analysis.age_distribution
        inputs: {records: cleaned_records, by_sex: true}
        output_mapping: {ages: ages}

    - key: qx_table
      type: list[dict]
      description: >
        Taux bruts de mortalité par âge entier : age, E_x, D_x, qx,
        method_name. Consommé par la section table_construction
        (raw_rates / full_report) et par builder.smoothing.
      produced_by:
        tool: builder.crude_rates
        inputs: {exposure_table: exposure_table}
        output_mapping: {qx_table: qx_table}

    - key: smoothed_table
      type: list[dict]
      description: >
        Taux lissés par âge : age, q_x_brut, q_x_lisse. Produit par
        builder.smoothing (mode full_report uniquement). En mode
        raw_rates, smoothed_table est assimilé à qx_table par une
        branche déterministe du Builder.
      produced_by:
        tool: builder.smoothing
        inputs: {qx_table: qx_table}
        output_mapping: {smoothed_table: smoothed_table}

    - key: qx_deciles_table
      type: list[dict]
      description: >
        Agrégation des taux par déciles d'exposition (10 buckets représentant
        ~10% chacun). Colonnes : age_range, E_x_sum, proportion, D_x_observed,
        D_x_predicted, ecart, ecart_pct, ci_lower, ci_upper. Reproduit la
        structure du Tableau 7 du rapport référence.
      produced_by:
        tool: aggregation.exposure_deciles
        inputs: {qx_table: qx_table}
        output_mapping: {qx_deciles_table: qx_deciles_table}

    - key: ci_table
      type: list[dict]
      description: >
        Intervalles de confiance à 95% pour les taux lissés par âge.
        Colonnes : age, q_x_lisse, ci_lower, ci_upper. Sert au chart
        multi-séries de la section smoothing (style aire).
        Le tool builder.validation appelle par défaut function_name
        =confidence_intervals avec alpha=0.05 (IC 95%) sur q_x_lisse.
      produced_by:
        tool: builder.validation
        inputs: {}
        output_mapping: {ci_table: ci_table}

    - key: cohort_min_age
      type: int
      description: "Âge minimum de la cohorte (issu de builder.exposure)."
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {age_min: cohort_min_age}

    - key: cohort_max_age
      type: int
      description: "Âge maximum de la cohorte (issu de builder.exposure)."
      produced_by:
        tool: builder.exposure
        inputs: {records: cleaned_records}
        output_mapping: {age_max: cohort_max_age}


# ─────────────────────────────────────────────────────────────────────────
# Sections — purement rédactionnel
# ─────────────────────────────────────────────────────────────────────────
sections:

  - id: preamble
    label: "Préambule"
    required: true
    dependencies: []
    activation:
      report_mode: [full_report, raw_rates, description]

    narrative:
      text_default: |
        Ce rapport présente {{ study_objective }} construite à partir
        d'un portefeuille observé de {{ start_year }} à {{ end_year }},
        soit {{ num_observation_years }} années. L'étude porte sur une
        exposition totale de {{ total_exposure }} années-personne
        et {{ total_deaths }} décès observés.

        L'étude se déroule en quatre étapes : analyse descriptive du
        portefeuille assuré, calcul des taux bruts de mortalité par
        application de la formule centrale q_x = D_x / E_x sur la
        cohorte, lissage des taux bruts pour obtenir la table d'expérience
        finale, puis validation observé vs prédit par classes d'âges.

      text_description: |
        Ce rapport présente une analyse descriptive du portefeuille
        assuré observé de {{ start_year }} à {{ end_year }}, soit
        {{ num_observation_years }} années. L'étude porte sur une
        exposition totale de {{ total_exposure }} années-personne
        et {{ total_deaths }} décès observés.

        Cette analyse couvre la composition du portefeuille (par sexe,
        par âge, par année), l'évolution annuelle des décès et les
        statistiques d'exposition. Aucun calcul de taux de mortalité
        ni de lissage n'est réalisé dans ce mode descriptif.

      text_raw_rates: |
        Ce rapport présente la table de mortalité d'expérience, en taux
        bruts uniquement (sans lissage), construite à partir d'un
        portefeuille observé de {{ start_year }} à {{ end_year }}, soit
        {{ num_observation_years }} années. L'étude porte sur une
        exposition totale de {{ total_exposure }} années-personne et
        {{ total_deaths }} décès observés.

        L'étude couvre l'analyse descriptive du portefeuille puis le
        calcul des taux bruts de mortalité q_x = D_x / E_x par âge,
        sans étape de lissage. Les taux sont restitués en l'état pour
        analyse ou ré-utilisation externe.

    llm_directives:
      tone: "neutre, descriptif, factuel"
      length_words: [300, 400]
      rag_query: "formulation préambule table mortalité portefeuille"

    visual_specs:
      - id: portfolio_composition
        type: table
        purpose: "Décrire la composition du portefeuille observé par sexe."
        source: segmentations.sexe   # sub-path dans le dict `segmentations`
        columns:
          - {key: valeur,         label: "Sexe"}
          - {key: nb_contrats,    label: "Exposition",                 format: int}
          - {key: nb_deces,       label: "Décès",                      format: int}
          - {key: pct_contrats,   label: "Part du portefeuille (%)",   format: float2}
          - {key: pct_deces,      label: "Part des décès (%)",         format: float2}

      - id: deaths_per_year
        type: chart
        chart_type: bar
        purpose: "Nombre de décès observés par année calendaire."
        source: serie
        x_axis: {key: annee,    label: "Année"}
        y_axis: {key: nb_deces, label: "Décès"}

  - id: data_preprocessing
    label: "Retraitement des données"
    required: true
    dependencies: [preamble]
    activation:
      report_mode: [full_report, raw_rates, description]

    narrative:
      text: |
        L'objet de cette section est de décrire les retraitements appliqués
        à la base initiale afin de mener les travaux de certification de la
        table d'expérience. De manière synthétique, les retraitements
        consistent à supprimer les contrats sans effet et les données
        aberrantes. Le détail des lignes exclues est donné ci-après.

    llm_directives:
      tone: "professionnel, actuariel, descriptif"
      length_words: [100, 180]
      rag_query: "retraitement données aberrantes portefeuille mortalité"

      post_table_analysis:
        instruction: >
          À partir de la table d'exclusions, produire 2 à 4 bullets :
          (1) identifier les règles qui ont le plus d'impact en volume ;
          (2) si une règle exclut > 10% de la base initiale, commenter
          spécifiquement (plausibilité actuarielle, qualité de données) ;
          (3) conclure sur la base finale conservée.
          Style factuel.
        length_words: [60, 120]
        few_shot_example: |
          - la règle "âge à la sortie < âge à l'entrée" exclut le plus de
            lignes, traduisant une saisie inversée récurrente ;
          - les règles d'âges > 100 ans n'excluent aucune ligne, indiquant
            une base cohérente sur ce critère ;
          - la base finale conserve {{ exclusion_report.final_count }} lignes
            sur {{ exclusion_report.initial_count }} initiales.

    visual_specs:
      - id: exclusion_table
        type: table
        purpose: "Détail des exclusions par règle appliquée."
        source: exclusion_report.rules
        columns:
          - {key: rule_label, label: "Règle appliquée"}
          - {key: count,      label: "Nombre de lignes supprimées", format: int}
        highlight_rule: totals_row

  - id: data_analysis_unisex
    label: "Analyse des données — base agrégée"
    required: true
    dependencies: [data_preprocessing]
    activation:
      report_mode: [full_report, raw_rates, description]
      gender_segmentation: [unisex]

    narrative:
      text: |
        La base de données utilisée regroupe {{ total_records }} lignes,
        réparties sur {{ num_observation_years }} années d'observation,
        conduisant à {{ total_exposure }} années-personne. Une analyse
        statistique annuelle est présentée ci-après.

    llm_directives:
      tone: "professionnel, actuariel, descriptif"
      length_words: [120, 200]
      rag_query: "présentation base données mortalité effectifs observation"

      post_table_analysis:
        instruction: >
          À partir du tableau annuel, produire 3 à 5 bullets analysant
          l'évolution. Pour chaque bullet : (1) constater la tendance
          avec valeurs saillantes ; (2) proposer une explication probable,
          métier (montée en puissance, changement de cible) ou statistique
          (faiblesse des effectifs, variance). Style actuariel, factuel.
        length_words: [80, 150]
        few_shot_example: |
          - forte croissance de l'exposition, traduisant une montée en
            puissance de la commercialisation ;
          - taux de décès annuel très volatil, s'expliquant par la faiblesse
            de l'effectif sur les premières années ;
          - âge moyen à l'entrée relativement stable ;
          - âge moyen au décès volatil.

    visual_specs:
      - id: annual_statistics
        type: table
        purpose: "Statistiques annuelles agrégées."
        source: serie
        columns:
          - {key: annee,            label: "Année",                  format: int}
          - {key: exposition_pa,    label: "Exposition",             format: int}
          - {key: nb_deces,         label: "Nb décès",               format: int}
          - {key: taux_deces,       label: "Qx %",                   format: pct2}
          - {key: age_moyen_deces,  label: "Âge moyen\nau décès",    format: float2}
        highlight_rule: totals_row

      - id: exposure_distribution_by_age
        type: chart
        chart_type: bar
        purpose: "Distribution des âges à l'entrée par tranches."
        source: ages.distribution_list
        x_axis: {key: tranche,     label: "Âge (tranches)"}
        y_axis: {key: nb_contrats, label: "Effectif"}

  - id: data_analysis_by_sex
    label: "Analyse des données — ventilation par sexe"
    required: true
    dependencies: [data_preprocessing]
    activation:
      report_mode: [full_report, raw_rates, description]
      gender_segmentation: [by_sex]

    narrative:
      text: |
        La base de données utilisée regroupe {{ total_records }} lignes,
        réparties sur {{ num_observation_years }} années d'observation,
        conduisant à {{ total_exposure }} années-personne. L'étude étant
        conduite par sexe, les statistiques annuelles et la distribution
        des âges sont présentées séparément pour les hommes et les femmes.

    llm_directives:
      tone: "professionnel, actuariel, descriptif"
      length_words: [150, 250]
      rag_query: "analyse par sexe mortalité effectifs portefeuille"

      post_table_analysis:
        instruction: >
          À partir des deux tableaux annuels (H et F), produire 4 à 6 bullets
          analysant l'évolution pour chaque sexe ET comparant les tendances
          entre sexes. Pour chaque constat : (1) valeur saillante ;
          (2) explication probable (métier ou statistique). Mettre en
          évidence les écarts H/F significatifs.
        length_words: [120, 200]
        few_shot_example: |
          - exposition masculine en forte croissance, exposition féminine
            stable, traduisant une cible commerciale majoritairement masculine ;
          - taux de décès systématiquement supérieur chez les hommes
            (ratio ~2:1), cohérent avec la littérature actuarielle ;
          - âge moyen au décès plus élevé chez les femmes ;
          - volatilité des taux comparable entre sexes sur la période.

    visual_specs:
      - id: annual_statistics_male
        type: table
        purpose: "Statistiques annuelles — hommes."
        source: serie_h
        columns:
          - {key: annee,            label: "Année",                  format: int}
          - {key: exposition_pa,    label: "Exposition",             format: int}
          - {key: nb_deces,         label: "Nb décès",               format: int}
          - {key: taux_deces,       label: "Qx %",                   format: pct2}
          - {key: age_moyen_deces,  label: "Âge moyen\nau décès",    format: float2}
        highlight_rule: totals_row

      - id: annual_statistics_female
        type: table
        purpose: "Statistiques annuelles — femmes."
        source: serie_f
        columns:
          - {key: annee,            label: "Année",                  format: int}
          - {key: exposition_pa,    label: "Exposition",             format: int}
          - {key: nb_deces,         label: "Nb décès",               format: int}
          - {key: taux_deces,       label: "Qx %",                   format: pct2}
          - {key: age_moyen_deces,  label: "Âge moyen\nau décès",    format: float2}
        highlight_rule: totals_row

      - id: exposure_distribution_male
        type: chart
        chart_type: bar
        purpose: "Distribution des âges — hommes."
        source: ages.distribution_list_h
        x_axis: {key: tranche,     label: "Âge (tranches)"}
        y_axis: {key: nb_contrats, label: "Effectif"}

      - id: exposure_distribution_female
        type: chart
        chart_type: bar
        purpose: "Distribution des âges — femmes."
        source: ages.distribution_list_f
        x_axis: {key: tranche,     label: "Âge (tranches)"}
        y_axis: {key: nb_contrats, label: "Effectif"}

  # ─────────────────────────────────────────────────────────────────────────
  # Section : Construction de la table de mortalité (taux bruts par âge)
  # Active en mode raw_rates ET full_report (pas description).
  # Cf. rapport référence AF8796-TD3 §3 "La construction de la table".
  # Consomme `qx_table` produit par `builder.crude_rates` (D_x, E_x, q_x
  # par âge entier sur la cohorte cohort_min_age..cohort_max_age).
  # ─────────────────────────────────────────────────────────────────────────
  - id: table_construction
    label: "Construction de la table — taux bruts par âge"
    required: true
    dependencies: [data_preprocessing]
    activation:
      report_mode: [full_report, raw_rates]

    narrative:
      text_default: |
        Les taux bruts de mortalité q_x par âge ont été estimés à partir
        des {{ total_exposure }} années-personne et {{ total_deaths }} décès
        observés sur la cohorte d'âges {{ cohort_min_age }} à {{ cohort_max_age }} ans.
        Pour chaque âge x, le taux brut est défini par q_x = D_x / E_x,
        où D_x désigne les décès observés et E_x l'exposition centrale.
        Ces taux bruts constituent l'étape intermédiaire avant lissage
        et calibration de la table d'expérience.

      text_raw_rates: |
        Les taux bruts de mortalité q_x par âge ont été estimés à partir
        des {{ total_exposure }} années-personne et {{ total_deaths }} décès
        observés sur la cohorte d'âges {{ cohort_min_age }} à {{ cohort_max_age }} ans.
        Pour chaque âge x, le taux brut est défini par q_x = D_x / E_x,
        où D_x désigne les décès observés et E_x l'exposition centrale.
        À la demande, AUCUN lissage n'est appliqué sur ces taux ; ils sont
        livrés en l'état pour analyse ou ré-utilisation externe.

    llm_directives:
      tone: "professionnel, actuariel, méthodologique"
      length_words: [120, 220]
      rag_query: "taux bruts mortalité q_x calcul actuariel exposition centrale"

      post_table_analysis:
        instruction: >
          À partir du tableau des taux bruts, commenter (1) la plage d'âges
          couverte ; (2) les âges où l'exposition est faible (E_x < 10) et
          où le taux brut est donc peu crédible ; (3) la forme générale
          (croissance avec l'âge, oscillations dues à la faible volumétrie).
          Ne PAS interpréter de tendance fine — les taux bruts sont par
          nature très volatils.
        length_words: [80, 150]
        few_shot_example: |
          - les taux bruts sont calculés sur la plage 30-85 ans, couvrant
            l'essentiel de l'exposition ;
          - aux âges extrêmes (< 35 et > 80), la faiblesse de l'exposition
            (E_x < 10) rend les taux peu crédibles ;
          - la forme générale est croissante avec l'âge, avec une volatilité
            marquée du fait de la taille modeste du portefeuille (1546 a.-p.).

    visual_specs:
      - id: crude_rates_deciles_table
        type: table
        purpose: >
          Synthèse des taux bruts agrégés par déciles d'exposition
          (10 buckets contigus représentant ~10% chacun). Reproduit la
          structure du Tableau 7 du rapport référence.
        source: qx_deciles_table
        columns:
          - {key: age_range,     label: "Classe d'âges"}
          - {key: E_x_sum,       label: "Exp",                     format: int}
          - {key: proportion,    label: "% Exp",                   format: float1}
          - {key: D_x_observed,  label: "Décès\nobservés",         format: int}
          - {key: D_x_predicted, label: "Décès\nprédits",          format: int}
          - {key: ecart_pct,     label: "Écart %",                 format: float1}
          - {key: ci_lower,      label: "IC Min\n95%",             format: int}
          - {key: ci_upper,      label: "IC Max\n95%",             format: int}

      - id: crude_rates_chart
        type: chart
        chart_type: scatter
        purpose: "Taux bruts q_x par âge — visualisation des variations."
        source: qx_table
        x_axis: {key: age, label: "Âge"}
        y_axis: {key: qx,  label: "Taux brut q_x"}

  # ─────────────────────────────────────────────────────────────────────────
  # Section : Lissage des taux bruts (full_report uniquement)
  # En raw_rates, smoothed_table est juste assimilé à qx_table par une
  # branche déterministe du Builder ; la section n'est pas activée.
  # ─────────────────────────────────────────────────────────────────────────
  - id: smoothing
    label: "Lissage des taux bruts"
    required: false
    dependencies: [table_construction]
    activation:
      report_mode: [full_report]

    narrative:
      text: |
        Les taux bruts q_x calculés à partir des {{ total_exposure }}
        années-personne et {{ total_deaths }} décès ont été lissés pour
        produire la table de mortalité d'expérience finale, sur la plage
        d'âges {{ cohort_min_age }} à {{ cohort_max_age }} ans. Le
        lissage atténue les variations dues à la faible volumétrie aux
        âges marginaux et garantit une croissance régulière du taux de
        mortalité avec l'âge. La méthode retenue est Whittaker-Henderson
        avec un paramètre de pénalisation par défaut.

    llm_directives:
      tone: "professionnel, actuariel, méthodologique"
      length_words: [150, 250]
      rag_query: "lissage taux bruts mortalité Whittaker-Henderson Makeham"

      post_table_analysis:
        instruction: >
          À partir du tableau lissé, commenter (1) la régularité obtenue
          (croissance monotone avec l'âge ou violations résiduelles) ;
          (2) l'écart maximal entre q_x_brut et q_x_lisse ; (3) la
          pertinence de la méthode au regard du nombre d'âges et de
          l'exposition disponible. Style sobre, pas de jugement de
          prudence (relève d'une section validation distincte).
        length_words: [80, 150]
        few_shot_example: |
          - les taux lissés présentent une croissance régulière avec
            l'âge, sans rupture marquée ;
          - l'écart maximal entre brut et lissé est observé aux âges
            extrêmes, où l'exposition est la plus faible ;
          - la méthode Whittaker-Henderson est adaptée à la plage
            d'âges couverte et au volume d'observations.

    visual_specs:
      - id: smoothing_table
        type: table
        purpose: "Taux bruts et taux lissés par âge."
        source: smoothed_table
        columns:
          - {key: age,        label: "Âge",          format: int}
          - {key: q_x_brut,   label: "Taux brut",    format: float4}
          - {key: q_x_lisse,  label: "Taux lissé",   format: float4}

      - id: obs_vs_smoothed_chart
        type: chart
        chart_type: multi_series
        purpose: >
          Comparaison taux bruts (points) et taux lissés (ligne) avec
          intervalle de confiance à 95% (aire). Reproduit la Figure 8
          du rapport référence.
        x_axis: {key: age, label: "Âge"}
        y_axis: {key: q_x, label: "Taux de mortalité q_x"}
        series:
          - {source: qx_table,       key_x: age, key_y: qx,        style: point, label: "Taux brut",  color: "#1A3668"}
          - {source: smoothed_table, key_x: age, key_y: q_x_lisse, style: line,  label: "Taux lissé", color: "#E25B34"}
          - {source: ci_table,       key_x: age, key_y_lower: ci_lower, key_y_upper: ci_upper, style: area, label: "IC 95%", color: "#E25B34", alpha: 0.18}


